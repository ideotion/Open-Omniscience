# Open-Omniscience Production Docker Compose Configuration
# 
# This configuration is designed for production deployment with:
# - PostgreSQL database (recommended for production)
# - Nginx as reverse proxy with SSL termination
# - Redis for caching and rate limiting
# - Prometheus and Grafana for monitoring
# - Proper security configurations
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# Environment Variables:
#   Set in .env.production file or export before running
#
# Author: Open-Omniscience Team
# License: Open Source (MIT)

version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: open-omniscience-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_omniscience}
      POSTGRES_USER: ${POSTGRES_USER:-omniscience}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - omniscience_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniscience} -d ${POSTGRES_DB:-open_omniscience}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: open-omniscience-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - omniscience_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID

  # Open-Omniscience API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
    container_name: open-omniscience-api
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omniscience}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-open_omniscience}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # API Configuration
      ENVIRONMENT: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-generate_a_strong_secret_key_here}
      
      # Rate Limiting
      RATE_LIMIT: "100/minute"
      
      # Security
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-"https://yourdomain.com,https://www.yourdomain.com"}
      
      # LLM Configuration (optional)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AUTO_DOWNLOAD_MODELS: "false"
      
      # Logging
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - omniscience_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/llm/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:1.25-alpine
    container_name: open-omniscience-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./src/static:/usr/share/nginx/html/src/static:ro
    depends_on:
      - api
    networks:
      - omniscience_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: open-omniscience-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.production.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - omniscience_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.2.0
    container_name: open-omniscience-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - omniscience_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Optional: Ollama for LLM (uncomment if needed)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: open-omniscience-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - omniscience_network
  #   security_opt:
  #     - no-new-privileges:true

# Production Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  # ollama_data:
  #   driver: local

# Production Network
networks:
  omniscience_network:
    driver: bridge
    name: open-omniscience-network
