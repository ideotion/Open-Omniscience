# =====================================================================
# DOMAIN x COVERAGE MATRIX
# Count of GLOBAL-coverage series (producer reaches ~190-245 countries:
# World Bank / WHO / FAOSTAT / ILOSTAT / IMF / UNESCO). Regional producers
# (OECD ~50, Eurostat/ECB EU, Pacific Data Hub PICTs, DOSM 1 country) are
# listed separately and NOT counted as global.
# =====================================================================
domain_coverage_matrix:
  counting_rule: "global = producer covers ~190+ countries; counts include high and medium rows in datasets above"
  global_series_per_domain:
    macroeconomy: 8        # WB GDP/GDPpc/growth/GNIpc + WB CPI/inflation + IMF CPI + IMF DOT/IFS-family
    prices_and_trade: 3    # WB exports %GDP + IMF PCPS + IMF DOT
    labour: 2              # WB unemployment (modeled ILO) + ILOSTAT employment
    demographics: 3        # WB population + urban % + fertility
    health: 5              # WHO life expectancy + WB life-exp/under5/infant/health-exp
    education: 4           # WB literacy/primary-enrol/edu-exp + UNESCO UIS (family)
    environment_and_climate: 3   # WB CO2 pc + total GHG pc + forest %
    energy: 1              # WB electricity access %  (THIN)
    agriculture_and_food: 2      # FAOSTAT QCL + FS
    poverty_and_development: 2   # WB Gini + poverty headcount
    governance_justice: 0        # GAP: WB WGI exists but no specific code verified this session
    gender: 2              # WB female LFP + women in parliament
    finance: 4             # WB real-interest/central-govt-debt/FDI + IMF BOP/IFS-family
  regional_or_single_country_producers_not_counted_above:
    oecd: "~50 economies; macroeconomy, labour (DF_IALFS_UNE_M verified)"
    eurostat: "~37 EU/EFTA/candidate; macroeconomy (NAMA_10_GDP verified), demographics (DEMO_R_D3DENS verified)"
    ecb: "euro area / EU; finance (EXR, EST)"
    pacific-data-hub: "~20+ PICTs; finance (DF_PUBLIC_DEBT verified), demographics/multi (DF_SOCECO verified)"
    dosm: "Malaysia + subnational; macroeconomy (cpi_core), prices (fuelprice)"
  thin_or_gap_domains:
    governance_justice: "0 verified global series. WB Worldwide Governance Indicators (WGI) and conflict-event datasets (e.g. ACLED/UCDP) exist but no concrete code/endpoint was verified this session - treat as a gap to fill."
    energy: "Only electricity access (EG.ELC.ACCS.ZS) verified-family. Production/consumption-by-source needs a dedicated producer (IEA is paywalled; consider Ember or EIA in a later pass)."
    agriculture_and_food: "Entirely dependent on the FAOSTAT family (bespoke JSON, needs a parser)."

# =====================================================================
# FORMAT SUMMARY  (ingestable today vs needs a parser)
# =====================================================================
format_summary:
  ingestable_today:
    worldbank-json:
      count: 29
      note: "Single parser handles all; no auth; ISO2/ISO3/all in path; broad coverage; 1960-latest."
    sdmx-json-2.1:
      count: 8
      members:
        - "OECD DSD_LFS@DF_IALFS_UNE_M (high)"
        - "OECD DSD_NAAG@DF_NAAG_I (medium)"
        - "ILOSTAT DF_EMP_TEMP_SEX_AGE_NB (medium)"
        - "Pacific DF_PUBLIC_DEBT (high)"
        - "Pacific DF_SOCECO (high)"
        - "IMF CPI dataflow (medium; new portal is SDMX 3.0 - confirm parser, else use legacy CompactData)"
        - "ECB EXR (medium; via format=jsondata)"
        - "ECB EST (medium; via format=jsondata)"
      note: "All no-auth. OECD has documented ordering/duplicate-key quirks + rate limiting. IMF SDMX 3.0 structures may need a parser tweak vs strict 2.1."
    ingestable_today_total: 37
  needs_a_parser:
    json-stat:
      count: 1
      members:
        - "Eurostat DEMO_R_D3DENS (and any Eurostat dataset via the .../statistics/1.0/data route with format=JSON)"
      note: "Eurostat's JSON is JSON-stat, NOT SDMX-JSON. One JSON-stat parser unlocks the whole Eurostat catalogue. (Eurostat also offers SDMX-ML 2.1 on a separate route - see NAMA_10_GDP - usable as a fallback.)"
    other-json-bespoke:
      count: 6
      members:
        - "WHO GHO WHOSIS_000001 (OData v4 JSON)"
        - "FAOSTAT QCL (bespoke JSON)"
        - "FAOSTAT FS (bespoke JSON)"
        - "UNESCO UIS (bespoke JSON; new 2024 API)"
        - "DOSM cpi_core (bespoke JSON)"
        - "DOSM fuelprice (bespoke JSON)"
      note: "Each is no-auth JSON but with its own envelope; WHO OData and FAOSTAT are the two highest-value parsers to write first."
    needs_a_parser_total: 7
  fallback_formats_available:
    sdmx-xml: "Eurostat (.../sdmx/2.1/data), IMF legacy (dataservices.imf.org SDMX_XML.svc) - use only if a JSON variant is unavailable."
