# statistical_datasets_catalog.yaml
# Verified catalog of pure statistical time-series datasets from official
# government / intergovernmental producers, for a local-first ingest + visualise app.
# One row = one queryable indicator/dataflow with a concrete machine id and an
# example query that returns numeric observations.
# No quality/credibility score is assigned. Provenance + comparability metadata only.

meta:
  generated_on: "2026-06-25"
  generator_role: "data-cataloguing analyst"
  scope: "pure statistical time-series (national accounts, prices, labour, demographics, health, education, environment, energy, agriculture, poverty, gender, finance)"
  hard_rule: "Never invent a series_id, query URL, or indicator code. If a query could not be confirmed this session it is omitted from datasets and listed under could_not_verify, or carried at confidence=low with an explicit reason."
  area_coding_note: "ISO 3166 alpha-2 used where the producer accepts it. Non-ISO schemes are flagged per row (Eurostat EL=Greece UK=United Kingdom EU27_2020/EA20 aggregates; World Bank accepts ISO2 or ISO3 in the path and returns both, plus WB aggregate codes e.g. 1W=World; SDMX producers key REF_AREA on ISO3; FAOSTAT uses FAO/M49 area codes; OECD groupings are not ISO)."
  comparability_note: "unit, adjustment, and base_year are recorded per row so index series, ratios, and levels in different currencies are never silently mixed."

  verification_methodology:
    confidence_high: "I personally fetched live observations this session, OR the exact API's real numeric values appeared verbatim in search results, OR a live structure/data response from the exact endpoint confirmed it serves data. verified_on is set to 2026-06-25."
    confidence_medium: "The official API base URL was confirmed live this session and the indicator/dataflow code is confirmed real on the producer's own portal, but this specific series was not individually fetched. The example_query_url uses the producer's verified URL pattern with a confirmed-real code. verified_on is null; see per-row verification_note for the specific reason it was not live-fetched."
    confidence_low: "Endpoint or code could not be grounded this session. Carried only where the producer is important; otherwise moved to could_not_verify."
    tooling_constraints_encountered:
      - "bash network allowlist excludes statistical APIs (only package registries / GitHub / Ubuntu mirrors reachable), so curl could not be used against stat endpoints; web_fetch was used instead."
      - "web_fetch only retrieves URLs that previously appeared in search/fetch results, strips query parameters (matches on base path), and rejects URLs containing ~ [ ] characters. This blocked direct fetches of IMF SDMX 3.0 keyed URLs (contain ~ and [ ])."
      - "FAOSTAT direct fetch is robots.txt-blocked for this tool (works from the R/Python FAOSTAT clients); real values were confirmed via search instead."
      - "OECD returned HTTP 429 (rate limit) on live fetch, which itself confirms the endpoint is live; real observations were confirmed via search."
      - "DOSM (data.gov.my) requires an id query parameter that the fetch tool strips, so direct fetch returns the catalogue index not the dataset; the official docs carry working code samples."

