        time_coverage: "1750-latest depending on column"
        unit: "per-column: co2 (MtCO2), co2_per_capita (t), co2_per_gdp, cumulative_co2, consumption_co2, total_ghg (MtCO2e), methane, nitrous_oxide, share_global_co2 (%)"
        adjustment: "raw; production- and consumption-based variants both present"
        base_year: null
        methodology_ref: "https://raw.githubusercontent.com/owid/co2-data/master/owid-co2-codebook.csv"
        license: "CC-BY-4.0 (OWID); upstream Global Carbon Project + others"
        auth: none
        verified_on: "2026-06-25"
        confidence: high
        verification_note: "Codebook live-fetched this session (same OWID GitHub infrastructure as the energy file). Complements Catalogue 1's World Bank EN.GHG.* per-capita series with absolute totals, cumulative, consumption-based, and per-GDP variants in one file."

  governance_democracy:
