# =====================================================================
# DOMAIN x COVERAGE MATRIX
# Count of GLOBAL-coverage datasets (producer reaches ~190+ countries) added by
# THIS catalogue. National statistical offices are single-country and are listed
# separately, not counted as global.
# =====================================================================
domain_coverage_matrix:
  counting_rule: "global = producer covers ~190+ countries/areas; counts include high and medium rows above"
  global_datasets_per_domain:
    energy: 4              # OWID energy, EIA international, Ember, IRENA  (fixes Catalogue 1's energy gap)
    environment_and_climate: 1   # OWID CO2 (absolute/cumulative/consumption-based; complements WB per-capita)
    governance_democracy: 2      # V-Dem (democracy indices), UCDP (conflict/violence)  (fills Catalogue 1 gap)
    finance: 1             # BIS (global). FRED counted under single-country (US-centric)
    development_and_inequality: 1  # UNDP HDI + composite indices
    trade: 1               # UN Comtrade
  single_country_or_us_centric_producers_not_counted_above:
    statistics-canada: "Canada + provinces (WDS JSON / full-table CSV)"
    abs: "Australia + ASGS regions (SDMX-JSON)"
    istat: "Italy + subnational (SDMX-JSON)"
    singstat: "Singapore (CSV/JSON)"
    fred: "United States (deep macro/financial history; SDMX-mirror of some intl series)"
    eia: "EIA also has US-only routes (electricity, petroleum, natural-gas, SEDS); its /international route IS global and is counted under energy"
  gap_status_after_this_catalogue:
    governance_justice: "RESOLVED for democracy + conflict (V-Dem, UCDP). Corruption (TI CPI) and rule-of-law (WJP) still unverified - see could_not_verify; note V-Dem's v2x_corr already provides a corruption index."
