        series_id: "v2x_polyarchy (+ index family; full dataset Country-Year Full+Others)"
        domain: governance_democracy
        example_query_url: "https://www.v-dem.net/data/the-v-dem-dataset/"
        format: csv
        frequency: annual
        geo_coverage: "global (202 countries); V-Dem country ids + COW + ISO; country-year"
        time_coverage: "1789-2024"
        unit: "index, typically 0-1 (e.g. v2x_polyarchy electoral democracy index); some indicators on ordinal/interval scales"
        adjustment: "expert-coded, measurement-model estimates with confidence intervals"
        base_year: null
        methodology_ref: "V-Dem Codebook v15/v16 (in each download ZIP); DOI 10.23696/vdemds25 (v15)"
        license: "Free for research/non-commercial use with citation"
        auth: none
        verified_on: null
        confidence: medium
        verification_note: "Fills Catalogue 1's governance gap. Bulk download (ZIP with CSV + codebook), not a queryable API; ingest the CSV once. Latest is v15 (2025)/v16. Canonical high-level indices: v2x_polyarchy (electoral), v2x_libdem (liberal), v2x_partipdem (participatory), v2x_delibdem (deliberative), v2x_egaldem (egalitarian); v2x_corr is the political corruption index. R package vdeminstitute/vdemdata loads it programmatically. Do not invent disaggregated variable names beyond the documented v2x_ family; consult the codebook."
    ucdp:
      - producer: ucdp
        dataset_name: "UCDP organized-violence / armed-conflict datasets (GED events; conflict-year deaths)"
        series_id: "UCDP GED (Georeferenced Event Dataset) + UCDP/PRIO Armed Conflict"
        domain: governance_democracy
        example_query_url: "https://ucdp.uu.se/downloads/"
        format: csv
        frequency: "annual (GED events also dated to the day; UCDP Candidate is monthly)"
        geo_coverage: "global, georeferenced (lat/lon); country + Gleditsch-Ward / ISO country ids"
        time_coverage: "1946-2025 (conflict-year); 1989-2025 (GED events)"
        unit: "event counts and best/low/high fatality estimates (deaths)"
        adjustment: "raw event coding"
        base_year: null
        methodology_ref: "https://ucdp.uu.se/downloads/ (codebooks per dataset)"
        license: "Free with citation (CC-BY-style; cite Davies/Pettersson/Oberg JPR)"
        auth: none
        verified_on: null
        confidence: medium
        verification_note: "Download center confirmed (GED Global v26.1; conflict-year 1946-2025). A JSON REST API also exists at the ucdpapi host (ucdpapi.pcr.uu.se) with version-pinned resources (e.g. gedevents); confirm the current version string in UCDP's API docs before wiring - not asserted here to avoid a stale version. Complements V-Dem with conflict/violence intensity."

  finance:
