# statistical_datasets_catalog_2_complementary.yaml
# COMPLEMENTARY catalogue (Catalogue 2). New producers only - no overlap with
# Catalogue 1 (which held World Bank, WHO, Eurostat-core, OECD-core, FAOSTAT,
# ILOSTAT, IMF, ECB, Pacific Data Hub, DOSM).
# Focus of this pass: (a) a DEEP energy section to fix Catalogue 1's thin energy
# coverage, (b) the governance/justice gap, (c) the national statistical offices
# flagged "to-verify" in Catalogue 1, plus trade, inequality, and global finance.
# One row = one queryable indicator/dataset with a concrete machine id and an
# example query/download that returns numeric observations.
# Same hard rule as Catalogue 1: never invent a series_id, URL, or code; if a query
# could not be confirmed this session it is omitted or listed under could_not_verify.

meta:
  generated_on: "2026-06-25"
  catalogue: "2 of 2 (complementary)"
  companion_file: "statistical_datasets_catalog.yaml"
  no_overlap_rule: "Producers already in Catalogue 1 are intentionally excluded here. Energy from this pass is additive to Catalogue 1's single verified energy series (World Bank EG.ELC.ACCS.ZS)."
  area_coding_note: "ISO 3166 alpha-3 used by OWID, IRENA, V-Dem, UCDP, UNDP. UN Comtrade uses UN M49 numeric reporter/partner codes. SDMX producers (ABS, ISTAT, BIS) key on their own REF_AREA schemes (ABS/ISTAT use national/subnational codes, not ISO; BIS uses 2-letter areas). StatCan uses internal vector/coordinate ids. FRED/EIA are largely single-country (US) plus EIA's global /international route."
  comparability_note: "unit, adjustment, and base_year recorded per row. Energy units differ across producers (TWh vs GWh vs primary-energy EJ vs per-capita kWh) - do not mix without converting; each row states its unit."

  verification_methodology:
    confidence_high: "Personally fetched live observations this session OR exact real numeric values appeared verbatim in search results OR a live structure/data response confirmed the endpoint serves data. verified_on = 2026-06-25."
    confidence_medium: "Official endpoint/base URL confirmed live this session and the indicator/dataflow/series code confirmed real on the producer's own materials, but this specific series was not individually fetched. example_query_url uses the producer's verified pattern with a confirmed-real code; verified_on = null; see per-row verification_note."
    confidence_low: "Could not be grounded this session; moved to could_not_verify."
    what_was_live_fetched_this_session:
      - "OWID energy-data CSV (GitHub) - header + Germany 2023 row: electricity_generation=506.720 TWh, solar_electricity=63.870, wind_electricity=140.540, renewables_share_elec=54.685; iso_code=ISO3."
      - "OWID energy codebook + OWID CO2 codebook (GitHub) - column/unit/source definitions confirmed."
    tooling_constraints_encountered:
      - "bash network allowlist reaches github.com / raw.githubusercontent.com / pypi / npm / Ubuntu mirrors ONLY. This is why OWID (GitHub-hosted) could be fetched live but api.eia.gov, fred, BIS, ABS, ISTAT, StatCan, comtrade, hdr.undp.org could not be curled and were verified via web_fetch/search against official docs."
      - "web_fetch only retrieves URLs seen in prior results, strips query params, and rejects URLs containing ~ [ ] (affects EIA data[]/facets[][] URLs and IMF-style keys)."

# =====================================================================
# DATASETS (grouped by domain, then producer)
# =====================================================================
datasets:

  energy:
    our-world-in-data:
      - producer: our-world-in-data
        dataset_name: "OWID Energy dataset (electricity by source, consumption, production, demand, capacity, carbon intensity)"
        series_id: "owid-energy-data"
        domain: energy
        example_query_url: "https://raw.githubusercontent.com/owid/energy-data/master/owid-energy-data.csv"
        format: csv
        frequency: annual
        geo_coverage: "global (~220 countries/regions); iso_code = ISO 3166-1 alpha-3"
        time_coverage: "1900s/1965-2024 depending on column"
        unit: "per-column: electricity in TWh (e.g. electricity_generation, solar_electricity, wind_electricity, coal_electricity), shares in % (renewables_share_elec, fossil_share_elec), per-capita in kWh, primary energy in TWh/EJ, carbon_intensity_elec in gCO2/kWh"
        adjustment: "raw"
        base_year: null
        methodology_ref: "https://raw.githubusercontent.com/owid/energy-data/master/owid-energy-codebook.csv"
        license: "CC-BY-4.0 (OWID); upstream Energy Institute + EIA + Ember"
        auth: none
        verified_on: "2026-06-25"
        confidence: high
        verification_note: "Live-fetched this session. ~250 columns. Single bulk file. Also accessible per-indicator as CSV via the OWID grapher API, e.g. https://ourworldindata.org/grapher/electricity-generation.csv?v=1&csvType=full&useColumnShortNames=false (documented pattern; .metadata.json sibling available). The bulk file is the most complete and the verified route."
    eia:
      - producer: eia
        dataset_name: "EIA International energy (country-level production, consumption, capacity by fuel)"
        series_id: "international"
        domain: energy
        example_query_url: "https://api.eia.gov/v2/international?api_key=YOUR_EIA_KEY"
        format: other-json
        frequency: "annual / monthly"
        geo_coverage: "global (country-level); EIA country codes"
        time_coverage: "varies by series (long history)"
        unit: "varies by facet (e.g. quad Btu, billion kWh, MW); returned in the unit facet"
        adjustment: "raw"
        base_year: null
        methodology_ref: "https://www.eia.gov/opendata/documentation.php"
        license: "EIA Copyrights and Reuse Policy (free)"
        auth: "api_key (free registration at https://www.eia.gov/opendata/register.php)"
        verified_on: null
        confidence: medium
        verification_note: "API v2 base https://api.eia.gov/v2/ and the /international route ('Country level production, consumption...') confirmed in EIA docs. Data lives under /v2/international/data with data[]/facets[][] parameters; browse /v2/international first to discover facet codes (productId, activityId, countryRegionId). Mechanism proven by EIA's own worked example returning real values (e.g. electricity/retail-sales/data -> Colorado residential 2009 = 10 cents/kWh). Not live-fetched: host off-allowlist + bracket URLs rejected by the fetch tool. NOTE: v2.1.6+ returns numeric values as JSON strings."
    ember:
      - producer: ember
        dataset_name: "Ember Yearly Electricity Data (generation, capacity, emissions, demand by source)"
        series_id: "yearly-electricity-data"
        domain: energy
        example_query_url: "https://ember-energy.org/data/yearly-electricity-data/"
        format: csv
        frequency: "yearly (a monthly dataset also exists for ~88 geographies)"
        geo_coverage: "global (215 countries/geographies)"
        time_coverage: "2000-latest (Europe from 1990); pre-2000 from Energy Institute"
        unit: "generation/demand in TWh, capacity in GW, emissions in MtCO2, CO2 intensity in gCO2/kWh, shares in %"
        adjustment: "raw"
        base_year: null
        methodology_ref: "https://ember-energy.org/data/electricity-data-explorer/"
        license: "CC-BY-4.0"
        auth: none
        verified_on: null
        confidence: medium
        verification_note: "Producer page + 215-geography coverage + CC-BY-4.0 confirmed. Ember's own download is a 'boxed link' on the dataset page (not a clean REST path), so the cleanest machine route is the OWID mirror (owid/energy-data CSV above, which is built from Ember + Energy Institute + EIA). Use Ember directly for monthly granularity and capacity detail."
    irena:
      - producer: irena
        dataset_name: "IRENASTAT renewable power capacity and generation (by technology)"
        series_id: "IRENASTAT (Power Capacity and Generation)"
        domain: energy
        example_query_url: "https://pxweb.irena.org/pxweb/en/IRENASTAT/IRENASTAT__Power%20Capacity%20and%20Generation/RE-SHARE_2025_H2_PX.px/"
        format: other-json
        frequency: annual
        geo_coverage: "global (all countries/areas); IRENA region/country/area codes"
        time_coverage: "2000-latest"
        unit: "capacity in MW, generation in GWh (18 renewable sources incl. hydro, solar PV, CSP, wind, geothermal, bioenergy)"
        adjustment: "raw"
        base_year: null
        methodology_ref: "https://www.irena.org/Data"
        license: "IRENA copyright (free reuse with attribution)"
        auth: none
        verified_on: null
        confidence: medium
        verification_note: "IRENASTAT PxWeb instance and the RE-SHARE table confirmed in search. PxWeb serves a table's metadata on GET and data on POST (JSON/JSON-stat or CSV). Needs a PxWeb client / JSON-stat parser. Browse https://pxweb.irena.org/pxweb/en/IRENASTAT/ for table ids (.px). Capacity table released March; generation/balances July."

  environment_and_climate:
