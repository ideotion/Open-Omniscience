        verification_note: "Base https://api.stlouisfed.org/fred/ and series/observations endpoint confirmed in official docs; returns {date,value} arrays. Real values documented (e.g. release_observations WCMITCMFODNS 1962 = 25.165). Canonical series: CPIAUCSL (CPI), UNRATE (unemployment), GNPCA (real GNP), WTISPLC (WTI oil), GDPC1. US-centric: a complement for deep US/financial series and a one-stop API, NOT for global choropleths. Not live-fetched (host off-allowlist)."
