# sources.yml — gap-fill source catalog (under-represented regions, plural stances)
# Built 2026-06-25. Every domain below was matched to a live/current outlet via web
# search corroboration this session unless confidence=medium (see catalog_report.md
# for the per-row basis and caveats). RSS omitted unless a working feed URL was seen
# (only Antara qualified this pass) — never guessed. All rows enabled:false for review.
#
# Field conventions:
#   country  : ISO-3166 alpha-2 lowercase, or null for genuinely transnational
#   language : ISO-639-1, restricted to the managed set {en,fr,es,pt,ar,ru,id,nl,...}
#   region   : continental bucket (Caribbean islands -> north-america; Guyana/Suriname
#              -> south-america; North-African MENA -> africa; Levant/Gulf/Israel -> asia)
#   ownership is carried in tags; lean only where a widely-cited assessment exists.
#   For 3 institutional rows (CARICOM, PINA, Dubawa) the 4-bucket ownership taxonomy
#   does not fit; ownership tag reflects org type (igo / ngo-civil-society / nonprofit).

