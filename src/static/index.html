<!DOCTYPE html>
<!--
  Open Omniscience - single-page UI for the trustworthy core.
  Copyright (C) 2026 Ideotion. GPL-3.0-or-later.

  Deliberately dependency-free: no CDN, no React, no web fonts. Everything is
  inline and local so it works offline inside a Qubes AppVM with the NetVM
  detached. It only exposes capabilities that actually work: manage sources,
  ethically ingest (RSS feed or single URL), Boolean full-text search, export.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Omniscience</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #181b22; --panel2: #20242e; --fg: #e6e8ec;
      --muted: #9aa3b2; --accent: #5b9dd9; --ok: #4caf7d; --warn: #d9a441;
      --err: #d96c6c; --border: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 12px; }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .v { color: var(--muted); font-size: 12px; }
    header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; gap: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .panel h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase;
      letter-spacing: .04em; color: var(--muted); }
    label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 3px; }
    input, select, textarea {
      width: 100%; background: var(--panel2); border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; padding: 8px 10px; font: inherit; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 140px; }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 6px;
      padding: 9px 14px; font: inherit; cursor: pointer; margin-top: 10px; }
    button.secondary { background: var(--panel2); border: 1px solid var(--border); color: var(--fg); }
    button:active { transform: translateY(1px); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    .muted { color: var(--muted); }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px;
      background: var(--panel2); border: 1px solid var(--border); }
    .pill.ok { color: var(--ok); } .pill.warn { color: var(--warn); } .pill.err { color: var(--err); }
    #toast { position: fixed; right: 16px; bottom: 16px; display: grid; gap: 8px; z-index: 50; }
    .note { padding: 10px 14px; border-radius: 8px; background: var(--panel2);
      border: 1px solid var(--border); max-width: 360px; font-size: 14px; }
    .note.ok { border-color: var(--ok); } .note.err { border-color: var(--err); }
    a { color: var(--accent); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Open&nbsp;Omniscience</h1>
    <span class="v" id="version">v—</span>
    <span class="status" id="health">checking…
      <span id="llm" class="pill" title="Local LLM (Ollama) status">LLM —</span>
      <a href="/docs" target="_blank" rel="noopener" style="margin-left:10px">API docs</a>
    </span>
  </header>

  <main>
    <!-- Search -->
    <section class="panel">
      <h2>Search the corpus</h2>
      <label for="q">Boolean query <span class="muted">(AND / OR / NOT, "phrases", parentheses)</span></label>
      <input id="q" placeholder='e.g.  (climate OR energy) AND policy NOT opinion' autocomplete="off">
      <div class="row">
        <div><label for="f-source">Source</label><input id="f-source" placeholder="exact name (optional)"></div>
        <div><label for="f-lang">Language</label><input id="f-lang" placeholder="en (optional)"></div>
        <div><label for="f-from">From</label><input id="f-from" type="date"></div>
        <div><label for="f-to">To</label><input id="f-to" type="date"></div>
      </div>
      <div class="row">
        <button onclick="doSearch()">Search</button>
        <button class="secondary" onclick="exportResults('csv')">Export CSV</button>
        <button class="secondary" onclick="exportResults('json')">Export JSON</button>
        <button class="secondary" onclick="exportEvidence()" title="Signed, tamper-evident bundle">Export signed evidence</button>
        <button class="secondary" onclick="compareFraming()" title="How different outlets cover this">Compare framing</button>
      </div>
      <div id="framing" style="margin-top:10px"></div>
      <div id="search-meta" class="hint"></div>
      <div style="overflow:auto; margin-top:10px;"><table id="results"></table></div>
    </section>

    <!-- Ingest -->
    <section class="panel">
      <h2>Ingest</h2>
      <div class="row">
        <div>
          <label for="ing-source">Ingest a source's RSS feed</label>
          <select id="ing-source"></select>
        </div>
        <div style="flex:0 0 auto; align-self:end;">
          <button onclick="ingestSource()">Fetch feed</button>
        </div>
      </div>
      <label for="ing-url">…or ingest a single article URL</label>
      <div class="row">
        <div><input id="ing-url" placeholder="https://example.com/article"></div>
        <div style="flex:0 0 auto;"><button onclick="ingestUrl()">Ingest URL</button></div>
      </div>
      <div class="hint">Fetching is ethical: robots.txt is respected (fail-closed) and rate-limited.</div>
      <div id="ingest-result" class="hint"></div>
    </section>

    <!-- Sources -->
    <section class="panel">
      <h2>Sources</h2>
      <div class="row">
        <div><label for="s-name">Name</label><input id="s-name" placeholder="Example News"></div>
        <div><label for="s-domain">Domain</label><input id="s-domain" placeholder="example.com"></div>
        <div><label for="s-rss">RSS URL</label><input id="s-rss" placeholder="https://example.com/feed.xml"></div>
        <div><label for="s-tags">Tags</label><input id="s-tags" placeholder="politics,world"></div>
      </div>
      <button onclick="addSource()">Add source</button>
      <button class="secondary" onclick="seedDefaults()" title="Register a curated starter set of public-interest RSS sources">Seed starter sources</button>
      <div style="overflow:auto; margin-top:12px;"><table id="sources"></table></div>
    </section>
  </main>

  <div id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => (s == null ? "" : String(s).replace(/[&<>"]/g,
      c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])));

    function toast(msg, kind="ok") {
      const n = document.createElement("div");
      n.className = "note " + kind; n.textContent = msg;
      $("toast").appendChild(n);
      setTimeout(() => n.remove(), 5000);
    }

    async function api(path, opts={}) {
      const res = await fetch(path, {
        headers: {"Content-Type": "application/json"}, ...opts,
      });
      const text = await res.text();
      let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) throw new Error((data && data.detail) || res.status + " " + res.statusText);
      return data;
    }

    async function loadHealth() {
      try {
        const h = await api("/api/health");
        $("version").textContent = "v" + h.version;
        $("health").innerHTML = '<span class="pill ok">healthy</span>';
      } catch (e) {
        $("health").innerHTML = '<span class="pill err">offline</span>';
      }
    }

    async function loadSources() {
      let sources = [];
      try { sources = await api("/api/sources"); } catch (e) { toast("Could not load sources: " + e.message, "err"); }
      const t = $("sources");
      t.innerHTML = "<tr><th>Name</th><th>Domain</th><th>RSS</th><th>Tags</th></tr>" +
        (sources.length ? sources.map(s =>
          `<tr><td>${esc(s.name)}</td><td>${esc(s.domain)}</td>
           <td>${s.rss_url ? esc(s.rss_url) : '<span class="muted">—</span>'}</td>
           <td>${(s.tags||[]).map(x=>`<span class="pill">${esc(x)}</span>`).join(" ")}</td></tr>`
        ).join("") : `<tr><td colspan="4" class="muted">No sources yet. Add one below.</td></tr>`);
      const sel = $("ing-source");
      sel.innerHTML = sources.filter(s => s.rss_url).map(s =>
        `<option value="${s.id}">${esc(s.name)}</option>`).join("")
        || '<option value="">(no sources with an RSS feed)</option>';
    }

    async function seedDefaults() {
      try {
        const r = await api("/api/sources/seed-defaults", {method: "POST"});
        toast(`Seeded ${r.seeded.created} new source(s) (${r.seeded.skipped} already present).`);
        loadSources();
      } catch (e) { toast("Seed failed: " + e.message, "err"); }
    }

    async function addSource() {
      const body = {
        name: $("s-name").value.trim(),
        domain: $("s-domain").value.trim(),
        rss_url: $("s-rss").value.trim() || null,
        tags: $("s-tags").value.trim(),
      };
      if (!body.name || !body.domain) { toast("Name and domain are required.", "err"); return; }
      try {
        await api("/api/sources/", {method: "POST", body: JSON.stringify(body)});
        toast("Source added.");
        ["s-name","s-domain","s-rss","s-tags"].forEach(id => $(id).value = "");
        loadSources();
      } catch (e) { toast("Add failed: " + e.message, "err"); }
    }

    function tally(t) {
      return Object.entries(t).filter(([k,v]) => v > 0)
        .map(([k,v]) => `${esc(k)}: ${v}`).join(", ") || "nothing new";
    }

    async function ingestSource() {
      const id = $("ing-source").value;
      if (!id) { toast("No RSS source selected.", "err"); return; }
      $("ingest-result").textContent = "Fetching feed… (rate-limited, may take a moment)";
      try {
        const r = await api(`/api/sources/${id}/ingest`, {method: "POST"});
        $("ingest-result").textContent = "Feed result — " + tally(r.tally);
        toast("Ingest complete."); doSearch();
      } catch (e) { $("ingest-result").textContent = ""; toast("Ingest failed: " + e.message, "err"); }
    }

    async function ingestUrl() {
      const url = $("ing-url").value.trim();
      const id = $("ing-source").value;
      if (!url) { toast("Enter a URL.", "err"); return; }
      if (!id) { toast("Select a source to attribute it to.", "err"); return; }
      $("ingest-result").textContent = "Fetching…";
      try {
        const r = await api("/api/ingest", {method: "POST",
          body: JSON.stringify({source_id: Number(id), url})});
        $("ingest-result").innerHTML = `Result: <span class="pill ${r.result==='stored'?'ok':'warn'}">${esc(r.result)}</span>` +
          (r.detail ? ` — ${esc(r.detail)}` : "");
        if (r.result === "stored") { $("ing-url").value = ""; doSearch(); }
      } catch (e) { $("ingest-result").textContent = ""; toast("Ingest failed: " + e.message, "err"); }
    }

    function searchParams() {
      const p = new URLSearchParams();
      const q = $("q").value.trim(); if (q) p.set("query", q);
      const src = $("f-source").value.trim(); if (src) p.set("source", src);
      const lang = $("f-lang").value.trim(); if (lang) p.set("language", lang);
      if ($("f-from").value) p.set("start_date", $("f-from").value);
      if ($("f-to").value) p.set("end_date", $("f-to").value);
      return p;
    }

    async function doSearch() {
      const p = searchParams(); p.set("limit", "50");
      try {
        const data = await api("/api/articles?" + p.toString());
        $("search-meta").textContent = `${data.total} result(s)` + (data.total > data.results.length ?
          ` (showing ${data.results.length})` : "");
        const t = $("results");
        t.innerHTML = "<tr><th>Title</th><th>Source</th><th>Published</th><th>Lang</th><th></th></tr>" +
          (data.results.length ? data.results.map(a =>
            `<tr><td><div>${esc(a.title) || '<span class="muted">(untitled)</span>'}</div>
                 <div class="muted" style="font-size:12px">${esc((a.content||"").slice(0,160))}…</div></td>
             <td>${esc(a.source)}</td><td class="muted">${esc((a.published_at||"").slice(0,10))}</td>
             <td>${esc(a.language||"")}</td>
             <td><a href="${esc(a.url)}" target="_blank" rel="noopener">open</a>
                 <button class="secondary" style="margin-top:4px;padding:3px 8px"
                   onclick="summarize(${a.id}, this)">Summarize</button>
                 <button class="secondary" style="margin-top:4px;padding:3px 8px"
                   onclick="translateArticle(${a.id}, this)">Translate</button>
                 <div class="summary muted" style="font-size:12px;margin-top:4px"></div></td></tr>`
          ).join("") : `<tr><td colspan="5" class="muted">No matches.</td></tr>`);
      } catch (e) { toast("Search failed: " + e.message, "err"); }
    }

    function exportResults(fmt) {
      const p = searchParams(); p.set("format", fmt);
      window.open("/api/articles/export?" + p.toString(), "_blank");
    }

    async function loadLlmHealth() {
      try {
        const h = await api("/api/llm/health");
        const el = $("llm");
        if (h.available) { el.className = "pill ok"; el.textContent = `LLM ✓ (${h.installed_models.length} models)`; }
        else { el.className = "pill warn"; el.textContent = "LLM offline"; el.title = h.detail || ""; }
      } catch (e) { $("llm").textContent = "LLM —"; }
    }

    async function summarize(id, btn) {
      const cell = btn.parentElement.querySelector(".summary");
      cell.textContent = "Summarizing locally…";
      try {
        const r = await api(`/api/llm/articles/${id}/summarize`, {method: "POST", body: "{}"});
        cell.textContent = `“${r.result}”  — ${r.model}`;
      } catch (e) { cell.textContent = ""; toast("Summarize: " + e.message, "err"); }
    }

    async function translateArticle(id, btn) {
      const cell = btn.parentElement.querySelector(".summary");
      cell.textContent = "Translating locally…";
      try {
        const r = await api(`/api/llm/articles/${id}/translate`,
          {method: "POST", body: JSON.stringify({target_language: "English"})});
        cell.textContent = `[${r.source_language || "?"}→${r.target_language}] ${r.result}  — ${r.model}`;
      } catch (e) { cell.textContent = ""; toast("Translate: " + e.message, "err"); }
    }

    async function compareFraming() {
      const q = $("q").value.trim();
      const el = $("framing");
      el.innerHTML = "<span class='muted'>Comparing how outlets frame this…</span>";
      try {
        const d = await api("/api/framing" + (q ? "?query=" + encodeURIComponent(q) : ""));
        if (!d.framing || !d.framing.length) { el.innerHTML = "<span class='muted'>No coverage to compare.</span>"; return; }
        const rows = d.framing.map(f =>
          `<tr><td>${esc(f.source)}</td>
               <td><span class="pill ${f.tone_label==='positive'?'ok':f.tone_label==='negative'?'err':''}">${f.tone_label} ${f.avg_tone.toFixed(2)}</span></td>
               <td class="muted">${f.article_count}</td>
               <td class="muted" style="font-size:12px">${(f.top_terms||[]).slice(0,6).map(esc).join(", ")}</td></tr>`
        ).join("");
        el.innerHTML = `<table><tr><th>Outlet</th><th>Tone (VADER)</th><th>#</th><th>Emphasised terms</th></tr>${rows}</table>
          <div class="hint">${esc(d.caveat)}</div>`;
      } catch (e) { el.innerHTML = ""; toast("Framing: " + e.message, "err"); }
    }

    async function exportEvidence() {
      const q = $("q").value.trim();
      if (!q) { toast("Enter a search query to scope the evidence bundle.", "err"); return; }
      try {
        const bundle = await api("/api/reports/evidence",
          {method: "POST", body: JSON.stringify({query: q, case_name: q})});
        const blob = new Blob([JSON.stringify(bundle, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "evidence-bundle.json"; a.click();
        toast(`Signed bundle: ${bundle.manifest.item_count} item(s), verify with scripts/verify_evidence.py`);
      } catch (e) { toast("Evidence export: " + e.message, "err"); }
    }

    $("q").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
    loadHealth(); loadLlmHealth(); loadSources(); doSearch();
  </script>
</body>
</html>
