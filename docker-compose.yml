version: '3.8'

services:
  # Main application service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-omniscience-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/open_omniscience.db
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Persist data, audit logs, and logs
      - ./data:/app/data
      - ./audit:/app/audit
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.insert(0, 'src'); from database.models import engine; print('DB OK')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - open-omniscience-network

  # PostgreSQL database (optional, for production)
  db:
    image: postgres:15-alpine
    container_name: open-omniscience-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=open_omniscience
      - POSTGRES_USER=open_omniscience
      - POSTGRES_PASSWORD=change_this_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_omniscience -d open_omniscience"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-omniscience-network
    profiles:
      - production

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: open-omniscience-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - open-omniscience-network
    profiles:
      - production

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: open-omniscience-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - open-omniscience-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  open-omniscience-network:
    driver: bridge
