version: '3.8'

# Docker Compose configuration for Open-Omniscience with Local LLM Support
# This extends the base configuration with Ollama and LLM capabilities

services:
  open-omniscience:
    build:
      context: .
      dockerfile: Dockerfile.llm
    container_name: open-omniscience-llm
    ports:
      - "8000:8000"    # Open-Omniscience API
      - "11434:11434"  # Ollama API
    environment:
      - DATABASE_URL=sqlite:////app/data/open_omniscience.db
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - DOWNLOAD_DEFAULT_MODELS=true
      - AUTO_DOWNLOAD_MODELS=true
      - ALLOWED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
    volumes:
      - ./data:/app/data
      - ollama_models:/root/.ollama
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - open-omniscience-network

  # Optional: Separate Ollama service (alternative to running in same container)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #     - OLLAMA_ORIGINS=*
  #   restart: unless-stopped
  #   networks:
  #     - open-omniscience-network

volumes:
  ollama_models:
    driver: local

networks:
  open-omniscience-network:
    driver: bridge
