name: Test Suite

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: open_omniscience_test
          POSTGRES_USER: open_omniscience
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: '**/requirements-*.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-all.txt
          pip install -e ".[dev,test]"

      - name: Run linting
        run: |
          echo "Running code style checks..."
          make lint || echo "Linting failed, but continuing with tests"

      - name: Run type checking
        run: |
          echo "Running type checking..."
          make lint-mypy || echo "Type checking failed, but continuing with tests"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+psycopg2://open_omniscience:test_password@localhost:5432/open_omniscience_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "Running unit tests..."
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term

      - name: Run pillar tests
        env:
          DATABASE_URL: postgresql+psycopg2://open_omniscience:test_password@localhost:5432/open_omniscience_test
        run: |
          echo "Running pillar tests..."
          python -m pytest pillar2/tests/ pillar3/tests/ pillar4/tests/ -v --tb=short || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/

  test-sqlite:
    name: SQLite Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-all.txt

      - name: Run SQLite tests
        env:
          DATABASE_URL: sqlite:///./test_open_omniscience.db
        run: |
          echo "Running SQLite-specific tests..."
          python -m pytest tests/ -v --tb=short -k "sqlite or not postgres"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          echo "Running Bandit security scan..."
          bandit -r src/ --format json -o bandit-report.json || true

      - name: Run Safety dependency scan
        run: |
          echo "Running Safety dependency scan..."
          safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
