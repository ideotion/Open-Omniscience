# Open Omniscience CI -- the single, working workflow.
# Replaces six legacy workflows that referenced a nonexistent requirements-all.txt,
# targeted Python 3.12, and ran on branches this repo does not use.
name: CI

on:
  # Run on every pushed branch so the active release branch (0.05, 0.06, 0.07,
  # ...) is always covered. Pinning to one old branch let direct pushes to the
  # default branch ship unchecked (finding ARCH-01); branches-ignore: [] keeps
  # the trigger from rotting on each release-cycle rename.
  push:
    branches-ignore: []
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + analysis + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true  # advisory until the legacy style debt is burned down

      - name: Migration drift (models vs Alembic baseline)
        run: |
          alembic upgrade head
          alembic check

      - name: Test (pytest)
        run: python -m pytest -q

  crypto:
    runs-on: ubuntu-latest
    name: PQC signing path (hybrid Ed25519 + ML-DSA)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Installs the optional [pqc] extra so the post-quantum half of the hybrid
      # signature (custody + signed annotation bundles) is actually exercised, instead
      # of being skipped as it is in the default lane (audit finding F-006).
      - name: Install (core + analysis + dev + pqc)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev,pqc]"

      - name: Test the hybrid signing + signed annotation bundles
        run: python -m pytest -q tests/test_custody_signing.py tests/test_annotations.py
