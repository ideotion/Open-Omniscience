# Open Omniscience CI -- the single, working workflow.
# Replaces six legacy workflows that referenced a nonexistent requirements-all.txt,
# targeted Python 3.12, and ran on branches this repo does not use.
name: CI

on:
  # Run on every pushed branch so the active release branch (0.05, 0.06, 0.07,
  # ...) is always covered. Pinning to one old branch let direct pushes to the
  # default branch ship unchecked (finding ARCH-01); branches-ignore: [] keeps
  # the trigger from rotting on each release-cycle rename.
  push:
    branches-ignore: []
  pull_request:
  workflow_dispatch:
  # Weekly security cadence (RM-10 / 0.0.8 WP2): a freshly published CVE should
  # surface even in a quiet week, without waiting for a push.
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  # Lightweight weekly job (RM-10): dependency + SAST audit only. Runs ONLY on
  # the schedule; the push/PR lanes get the same gates inside the test job.
  scheduled-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    name: Weekly security audit (bandit + pip-audit)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (core only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: SAST (bandit, medium+ severity)
        run: |
          python -m pip install bandit
          bandit -r src/ -ll -q
      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit --skip-editable

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + analysis + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true  # advisory until the legacy style debt is burned down

      - name: Migration drift (models vs Alembic baseline)
        run: |
          alembic upgrade head
          alembic check

      - name: Test (pytest)
        run: python -m pytest -q

      # Blocking security gates (v0.0.7 audit): both are clean today, so any
      # failure is a real regression or a freshly published CVE worth seeing.
      - name: SAST (bandit, medium+ severity)
        run: |
          python -m pip install bandit
          bandit -r src/ -ll -q

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit --skip-editable

  # The "extras are optional" contract (audit finding TEST-06): a core-only
  # install must boot and its suite must be green, with analysis-dependent tests
  # skipping cleanly rather than failing.
  core-only:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: Core-only install (no [analysis] extra)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + dev only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Boot check
        run: python -c "from src.api.main import app; print(sum(1 for _ in app.routes), 'routes')"

      - name: Test (pytest, analysis modules must skip)
        run: python -m pytest -q

  crypto:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: PQC signing path (hybrid Ed25519 + ML-DSA)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Installs the optional [pqc] extra so the post-quantum half of the hybrid
      # signature (custody + signed annotation bundles) is actually exercised, instead
      # of being skipped as it is in the default lane (audit finding F-006).
      - name: Install (core + analysis + dev + pqc)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev,pqc]"

      - name: Test the hybrid signing + signed annotation bundles
        run: python -m pytest -q tests/test_custody_signing.py tests/test_annotations.py
