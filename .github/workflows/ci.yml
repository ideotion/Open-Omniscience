# Open Omniscience CI -- the single, working workflow.
# Replaces six legacy workflows that referenced a nonexistent requirements-all.txt,
# targeted Python 3.12, and ran on branches this repo does not use.
name: CI

on:
  # Run on every pushed branch so the active release branch (0.05, 0.06, 0.07,
  # ...) is always covered. Pinning to one old branch let direct pushes to the
  # default branch ship unchecked (finding ARCH-01); branches-ignore: [] keeps
  # the trigger from rotting on each release-cycle rename.
  push:
    branches-ignore: []
  pull_request:
  workflow_dispatch:
  # Weekly security cadence (RM-10 / 0.0.8 WP2): a freshly published CVE should
  # surface even in a quiet week, without waiting for a push.
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  # Lightweight weekly job (RM-10): dependency + SAST audit only. Runs ONLY on
  # the schedule; the push/PR lanes get the same gates inside the test job.
  scheduled-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    name: Weekly security audit (bandit + pip-audit)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (core only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: SAST (bandit, medium+ severity)
        run: |
          python -m pip install bandit
          bandit -r src/ -ll -q
      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit --skip-editable

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + analysis + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true  # advisory until the legacy style debt is burned down

      - name: Migration drift (models vs Alembic baseline)
        # The CI database is a fresh throwaway file; since at-rest encryption
        # became the default (PR-E), creating a store without a passphrase
        # requires the EXPLICIT plaintext opt-out — which is exactly what this
        # is. Real installs are unaffected (the unlock flow supplies THE
        # passphrase). This step was the silent red on 0.09 since 2026-06-11.
        env:
          OO_DB_PLAINTEXT: "1"
        run: |
          alembic upgrade head
          alembic check

      - name: Test (pytest)
        run: python -m pytest -q

      # Type-check ratchet (0.0.8 WP7 / MAINT-03): the Mapped[] ORM migration cut
      # mypy from 303 to 128 errors. The gate fails only if the count RISES above
      # the baseline -- new code must not add type errors; tighten the number as
      # the long tail is paid down (target: 0, then a plain blocking `mypy src/`).
      - name: Type-check ratchet (mypy)
        env:
          MYPY_BASELINE: "128"
        run: |
          count=$(python -m mypy src/ 2>/dev/null | grep -c " error: " || true)
          echo "mypy errors: $count (baseline: $MYPY_BASELINE)"
          if [ "$count" -gt "$MYPY_BASELINE" ]; then
            echo "::error::mypy error count rose above the baseline ($count > $MYPY_BASELINE)"
            python -m mypy src/ | tail -40
            exit 1
          fi

      # Blocking security gates (v0.0.7 audit): both are clean today, so any
      # failure is a real regression or a freshly published CVE worth seeing.
      - name: SAST (bandit, medium+ severity)
        run: |
          python -m pip install bandit
          bandit -r src/ -ll -q

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit --skip-editable

  # The "extras are optional" contract (audit finding TEST-06): a core-only
  # install must boot and its suite must be green, with analysis-dependent tests
  # skipping cleanly rather than failing.
  core-only:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: Core-only install (no [analysis] extra)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + dev only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Boot check
        run: python -c "from src.api.main import app; print(sum(1 for _ in app.routes), 'routes')"

      - name: Test (pytest, analysis modules must skip)
        run: python -m pytest -q

  crypto:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: PQC signing path (hybrid Ed25519 + ML-DSA)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Installs the optional [pqc] extra so the post-quantum half of the hybrid
      # signature (custody + signed annotation bundles) is actually exercised, instead
      # of being skipped as it is in the default lane (audit finding F-006).
      - name: Install (core + analysis + dev + pqc)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev,pqc]"

      - name: Test the hybrid signing + signed annotation bundles
        run: python -m pytest -q tests/test_custody_signing.py tests/test_annotations.py

  # ----------------------------------------------------------------------- #
  # UNIVERSAL PORTABILITY (maintainer-ruled 2026-06-11): the 3-OS matrix IS
  # the definition of "supported". The Windows/macOS lanes start as
  # OBSERVATION lanes (continue-on-error) while platform-specific failures
  # are discovered and fixed honestly -- they graduate to required (drop the
  # flag) once green; Linux remains the release gate meanwhile. Never claim
  # an OS works without this proof.
  # ----------------------------------------------------------------------- #
  portability:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Portability observation (${{ matrix.os }})
    continue-on-error: true  # observation lane: graduates to required when green
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (core + analysis + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev]"

      - name: Boot check
        run: python -c "from src.api.main import app; print(sum(1 for _ in app.routes), 'routes')"

      - name: Test (pytest)
        run: python -m pytest -q

  # SQLCipher driver proof on every OS (gate zero, executed for real): the
  # at-rest encryption batch (PR-E) must not land on wheel inspection alone.
  # BLOCKING by design -- if a wheel breaks on any OS, we must know before
  # the crypto ships, not after.
  sqlcipher-smoke:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: SQLCipher wheel smoke (${{ matrix.os }})
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Encrypt, FTS5, wrong-key and stdlib-unreadable checks
        shell: python
        run: |
          import subprocess, sys
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "sqlcipher3==0.6.2"])
          import os, sqlite3, tempfile
          from sqlcipher3 import dbapi2 as sqc
          path = os.path.join(tempfile.mkdtemp(), "enc.db")
          con = sqc.connect(path)
          con.execute("PRAGMA key = 'smoke-pass'")
          ver = con.execute("PRAGMA cipher_version").fetchone()
          assert ver and "4." in ver[0], f"unexpected cipher_version: {ver}"
          con.execute("CREATE VIRTUAL TABLE ft USING fts5(body)")
          con.execute("INSERT INTO ft VALUES ('the quick brown fox')")
          assert con.execute("SELECT body FROM ft WHERE ft MATCH 'fox'").fetchone()
          con.execute("CREATE TABLE t(x)"); con.execute("INSERT INTO t VALUES (42)")
          con.commit(); con.close()
          with open(path, "rb") as fh:
              assert fh.read(16) != b"SQLite format 3\x00", "file header must be ciphertext"
          con = sqc.connect(path); con.execute("PRAGMA key = 'WRONG'")
          try:
              con.execute("SELECT x FROM t"); raise SystemExit("wrong key read succeeded")
          except sqc.DatabaseError:
              pass
          con.close()
          try:
              sqlite3.connect(path).execute("SELECT * FROM t")
              raise SystemExit("stdlib sqlite3 could read the encrypted file")
          except sqlite3.DatabaseError:
              pass
          print("sqlcipher3 OK on", sys.platform, "| cipher:", ver[0])
