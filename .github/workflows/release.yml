# Open Omniscience -- release artifacts from one tag (RC gate: "release action emits
# all artifacts; SHA256SUMS in release notes"). Tagging `vX.Y.Z` builds the Python
# sdist + wheel, computes SHA256SUMS, and publishes a GitHub Release carrying both the
# artifacts and the checksums. Debian is the V0.1 install target (maintainer 2026-06-17);
# the wheel/sdist + install.sh are the shippable artifacts. No signing key yet (manual,
# checksums-only for now -- signing is a tracked FUTURE_DEVELOPMENTS item).
#
# ONE job (build + publish together) so no artifacts cross job boundaries -- that keeps
# the action set to the two SHA-pinned actions already vetted in ci.yml (checkout,
# setup-python) and avoids unpinned upload/download-artifact.
name: Release

# Least privilege: read by default. The single job elevates to contents:write only
# because publishing a Release writes to the repo.
permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  # A manual dry-run from the Actions tab validates the build without publishing.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Never publish a red tree (RC 2026-07-02): a tag used to build + publish with NO
  # tests run at all -- combined with the default branch's superseded-cancelled run
  # cadence, a tag on a broken tree would have shipped attested-broken artifacts.
  # Same pinned actions + install recipe as ci.yml's blocking test job.
  test:
    name: Full suite gate (py3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install (core + analysis + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev]"
      - name: Test (pytest)
        run: python -m pytest -q

  release:
    name: Build + publish release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Verify the tag matches the package version
        # The version is single-sourced from pyproject; a tag that disagrees is a
        # mistake -- fail loudly rather than publish a mislabelled release.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        run: python -m build --outdir dist
      - name: Compute SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Publish GitHub Release with checksums in the notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          {
            echo "## Open Omniscience ${TAG}"
            echo ""
            echo "Local-first, offline-first investigative-intelligence platform."
            echo "Debian is the supported install target for this release."
            echo ""
            echo "### Install"
            echo '```'
            echo "pip install open_omniscience-*.whl   # or: ./install.sh"
            echo '```'
            echo ""
            echo "### Verify your download (SHA-256)"
            echo "No signing key yet -- verify integrity with the checksums below."
            echo '```'
            cat dist/SHA256SUMS
            echo '```'
          } > release_notes.md
          # An 0.x version is an alpha by the project's own maturity ladder
          # (docs/CONTRIBUTING.md) -- mark it honestly as a pre-release.
          prerelease=""
          case "${TAG#v}" in 0.*) prerelease="--prerelease" ;; esac
          if gh release view "${TAG}" >/dev/null 2>&1; then
            # A release for this tag already exists -- e.g. created together with
            # the tag from the GitHub UI, exactly what happened at v0.2.0 (the
            # create below then failed and the release shipped with NO artifacts).
            # Never fail the artifacts on that: attach/replace them on the existing
            # release and append the checksums to its notes when missing. The
            # existing notes text and pre-release flag are the maintainer's --
            # left alone.
            gh release upload "${TAG}" dist/*.whl dist/*.tar.gz dist/SHA256SUMS --clobber
            gh release view "${TAG}" --json body --jq .body > existing_notes.md
            if ! grep -q "Verify your download (SHA-256)" existing_notes.md; then
              {
                cat existing_notes.md
                echo ""
                echo "### Verify your download (SHA-256)"
                echo "No signing key yet -- verify integrity with the checksums below."
                echo '```'
                cat dist/SHA256SUMS
                echo '```'
              } > merged_notes.md
              gh release edit "${TAG}" --notes-file merged_notes.md
            fi
          else
            gh release create "${TAG}" \
              dist/*.whl dist/*.tar.gz dist/SHA256SUMS \
              --title "${TAG}" \
              --notes-file release_notes.md \
              --verify-tag ${prerelease}
          fi
