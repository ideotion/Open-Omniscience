name: Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation tools
        run: |
          pip install mkdocs mkdocs-material mkdocs-with-pdf

      - name: Build documentation
        run: |
          mkdocs build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: false

  deploy-demo:
    name: Deploy Demo Instance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: render-com/action-deploy@v1
        with:
          render-api-key: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          wait-for-deployment: true

  notify:
    name: Deployment Notifications
    needs: [deploy-docs, deploy-demo]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Discord notification
        if: success()
        uses: Ilshidur/action-discord@v0.6.8
        with:
          args: "✅ Open Omniscience deployment successful! Version: ${{ github.ref_name }}"
          webhook: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send failure notification
        if: failure()
        uses: Ilshidur/action-discord@v0.6.8
        with:
          args: "❌ Open Omniscience deployment failed! Version: ${{ github.ref_name }}"
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
