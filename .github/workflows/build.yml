name: Build and Package

on:
  push:
    tags: [ 'v*' ]
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel

      - name: Build Python package
        run: |
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  appimage-build:
    name: Build AppImage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AppImage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            patchelf \
            desktop-file-utils \
            libgtk-3-0 \
            libcanberra-gtk3-0 \
            libcanberra-pulse \
            libcanberra-gtk-module

      - name: Build AppImage
        run: |
          chmod +x package/appimage/OpenOmniscience.AppImageBuilder
          ./package/appimage/OpenOmniscience.AppImageBuilder

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/*.AppImage

  deb-build:
    name: Build Debian Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            build-essential \
            debhelper \
            dh-make \
            fakeroot \
            lintian

      - name: Build Debian package
        run: |
          chmod +x package/deb/build-deb.sh
          ./package/deb/build-deb.sh

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: dist/*.deb

  release:
    name: Create Release
    needs: [build, appimage-build, deb-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/python-package/*
            artifacts/debian-package/*
            artifacts/appimage/*
          generate_release_notes: true
          draft: false
          prerelease: false
