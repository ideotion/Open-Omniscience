# Open-Omniscience Production Nginx Configuration
# 
# This configuration provides:
# - SSL/TLS termination with strong security settings
# - Reverse proxy to the API service
# - Static file serving
# - Rate limiting
# - Security headers
# - Gzip compression
# - Proper logging
#
# Usage: Mount this file to /etc/nginx/nginx.conf in the Nginx container
#
# Author: Open-Omniscience Team
# License: Open Source (MIT)

# Main context - Global configuration
user nginx;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

# Error logging
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Worker connections
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# HTTP context
http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75 75;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Server names hash bucket size
    server_names_hash_bucket_size 128;
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    log_format json_logs escape=json
        '{"time": "$time_iso8601", '
        '"remote_addr": "$remote_addr", '
        '"request": "$request", '
        '"status": $status, '
        '"body_bytes_sent": $body_bytes_sent, '
        '"request_time": $request_time, '
        '"http_referer": "$http_referer", '
        '"http_user_agent": "$http_user_agent", '
        '"http_x_forwarded_for": "$http_x_forwarded_for"}';
    
    access_log /var/log/nginx/access.log json_logs;
    error_log /var/log/nginx/error.log warn;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=1000r/m;
    
    # Connection limits
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # Timeouts
    client_header_timeout 60;
    client_body_timeout 60;
    keepalive_timeout 75;
    send_timeout 60;
    
    # Buffer sizes
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_body_buffer_size 16k;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self';" always;
    
    # Server configuration
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
    
    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name localhost;
        
        # SSL certificate configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # OCSP stapling
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        
        # Root location - Serve static files
        location / {
            root /usr/share/nginx/html;
            try_files /src/static/index.html /static/showcase.html /index.html =404;
            
            # Security headers for static content
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Static files
        location /static/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ =404;
            
            # Cache static assets
            add_header Cache-Control "public, max-age=86400";
            
            # Disable logging for static files
            access_log off;
        }
        
        # API proxy
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Rate limiting
            limit_req zone=api burst=20 nodelay;
            limit_req zone=global burst=100 nodelay;
            limit_conn addr 10;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;
            proxy_busy_buffers_size 32k;
            proxy_max_temp_file_size 2048m;
            
            # Disable caching for API
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        # Metrics endpoint
        location /metrics {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Allow Prometheus to scrape
            allow 127.0.0.1;
            allow ::1;
            # Add your Prometheus server IP here
            # allow 192.168.1.100;
            deny all;
            
            auth_basic "Metrics Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
        
        # Docs endpoint
        location /docs {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # OpenAPI schema
        location /openapi.json {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Redoc
        location /redoc {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Health check
        location /health {
            proxy_pass http://api:8000/api/llm/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Allow health checks
            allow all;
            auth_basic off;
        }
        
        # Error pages
        error_page 400 /400.html;
        error_page 401 /401.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 405 /405.html;
        error_page 500 /500.html;
        error_page 502 /502.html;
        error_page 503 /503.html;
        error_page 504 /504.html;
        
        location = /400.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /401.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /405.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /500.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /502.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /503.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /504.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
    
    # Monitoring server (optional)
    server {
        listen 8080;
        server_name monitoring.localhost;
        
        location / {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
