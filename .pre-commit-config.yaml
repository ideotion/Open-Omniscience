repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: forbid-new-submodules

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-exclude=migrations,__pycache__]
        additional_dependencies: [flake8-bugbear==23.12.2]

  - repo: https://github.com/pycqa/mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--python-version=3.12, --ignore-missing-imports]
        exclude: ^(migrations/|tests/fixtures/)

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-no-log-warn
      - id: rst-backticks
      - id: text-unicode-replacement-char

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--line-length=100, --fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: check-file-size
        name: Check file size
        entry: bash -c 'if [ $(wc -c < "$1") -gt 1048576 ]; then echo "File $1 is too large (>1MB)"; exit 1; fi'
        language: system
        types: [file]
        files: \.(py|md|txt|json|yaml|yml)$

default_language_version:
  python: python3.12

ci:
  autoupdate_schedule: monthly
  skip: []
  submodules: false