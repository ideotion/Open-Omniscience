# Open-Omniscience Production Prometheus Configuration
# 
# This configuration sets up Prometheus to monitor:
# - Open-Omniscience API service
# - PostgreSQL database
# - Redis cache
# - System metrics
#
# Usage: Mount this file to /etc/prometheus/prometheus.yml in Prometheus container
#
# Author: Open-Omniscience Team
# License: Open Source (MIT)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  
  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    environment: production
    application: open-omniscience

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Rule files for alerting
rule_files:
  # - "alert.rules"
  # - "recording.rules"

# Scrape configurations
scrape_configs:
  # Open-Omniscience API Service
  - job_name: 'open-omniscience-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 15s
    scrape_timeout: 10s
    
    # Metrics relabeling
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'open_omniscience_.*'
        action: keep
    
    # Alert rules for API
    # This is just configuration, actual alerts would be in rule_files

  # PostgreSQL Database
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    scrape_timeout: 10s
    
    # PostgreSQL exporter must be running separately
    # See: https://github.com/prometheus-community/postgres_exporter

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
    scrape_timeout: 10s
    
    # Redis exporter must be running separately
    # See: https://github.com/oliver006/redis_exporter

  # Node Exporter for System Metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    scrape_timeout: 10s
    
    # Node exporter must be running on each host
    # See: https://github.com/prometheus/node_exporter

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    scrape_timeout: 5s

  # Grafana (if monitoring is enabled)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s
    scrape_timeout: 10s
    
    # Grafana metrics endpoint
    metrics_path: '/metrics'

# Remote write configuration (optional)
# remote_write:
#   - url: 'https://remote-write-endpoint'
#     basic_auth:
#       username: 'user'
#       password: 'password'

# Remote read configuration (optional)
# remote_read:
#   - url: 'https://remote-read-endpoint'
#     basic_auth:
#       username: 'user'
#       password: 'password'

# Storage configuration
storage:
  tsdb:
    path: /prometheus
    retention:
      time: 200h
      size: 50GB
    
    # Wal settings
    wal_compression: true
    wal_segment_size: 32MB
    
    # Block ranges
    block_ranges:
      - max_block_duration: 2h

# Web configuration
web:
  enable_lifecycle: true
  enable_admin_api: false
  
  # TLS configuration (optional)
  # cert_file: /etc/prometheus/ssl/cert.pem
  # key_file: /etc/prometheus/ssl/key.pem
  
  # Basic auth (optional)
  # basic_auth_users:
  #   admin: $2y$10$hashed_password

