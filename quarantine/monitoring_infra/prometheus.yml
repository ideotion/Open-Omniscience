global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'open-omniscience'
    static_configs:
      - targets: ['open-omniscience-web-staging:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
