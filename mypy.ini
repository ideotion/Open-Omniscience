[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
warn_return_any = True

# Allow untyped functions in migrations and tests
[[tool.mypy.overrides]]
module = "src.database.migrations.*"
ignore_missing_imports = True
disallow_untyped_defs = False

[[tool.mypy.overrides]]
module = "tests.*"
ignore_missing_imports = True
disallow_untyped_defs = False

[[tool.mypy.overrides]]
module = "pillar2.tests.*"
ignore_missing_imports = True
disallow_untyped_defs = False

[[tool.mypy.overrides]]
module = "pillar3.tests.*"
ignore_missing_imports = True
disallow_untyped_defs = False

[[tool.mypy.overrides]]
module = "pillar4.tests.*"
ignore_missing_imports = True
disallow_untyped_defs = False

# Ignore missing imports for third-party libraries
[[tool.mypy.overrides]]
module = [
    "fastapi.*",
    "uvicorn.*",
    "sqlalchemy.*",
    "psycopg2.*",
    "requests.*",
    "beautifulsoup4.*",
    "python_multipart.*",
    "python_jose.*",
    "passlib.*",
    "pydantic.*",
    "yaml.*",
    "feedparser.*",
    "prometheus_client.*",
    "slowapi.*",
    "structlog.*",
    "numpy.*",
    "scikit_learn.*",
    "pandas.*",
    "ollama.*",
    "transformers.*",
    "sentence_transformers.*",
    "torch.*",
    "bleach.*",
    "concurrent.*",
]
ignore_missing_imports = True