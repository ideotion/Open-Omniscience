       x2="128"
       y2="80"
       stroke="#4299e1"
       stroke-width="3"
       stroke-linecap="round"
       id="search-line-1" />
    
    <line
       x1="128"
       y1="176"
       x2="128"
       y2="206"
       stroke="#4299e1"
       stroke-width="3"
       stroke-linecap="round"
       id="search-line-2" />
    
    <line
