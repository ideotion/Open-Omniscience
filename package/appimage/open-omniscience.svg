       r="80"
       fill="#2d3748"
       id="globe-base" />
    
    <!-- Globe lines (latitude/longitude) -->
    <path
       d="M 48 128 C 48 80, 80 48, 128 48 C 176 48, 208 80, 208 128 C 208 176, 176 208, 128 208 C 80 208, 48 176, 48 128 Z"
       fill="none"
       stroke="#4a5568"
       stroke-width="2"
       id="equator" />
    
    <path
       d="M 128 48 C 160 48, 184 72, 184 104 C 184 136, 160 160, 128 160 C 96 160, 72 136, 72 104 C 72 72, 96 48, 128 48 Z"
       fill="none"
       stroke="#4a5568"
       stroke-width="2"
       id="meridian" />
    
    <path
       d="M 128 48 C 104 48, 88 64, 88 88 C 88 112, 104 128, 128 128 C 152 128, 168 112, 168 88 C 168 64, 152 48, 128 48 Z"
