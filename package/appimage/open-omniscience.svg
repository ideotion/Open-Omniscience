        <dc:title>Open Omniscience Icon</dc:title>
        <dc:creator>Ideotion</dc:creator>
        <dc:date>2026-05-08</dc:date>
        <dc:description>Icon for Open Omniscience - Global Intelligence Platform for Investigative Journalism</dc:description>
        <cc:license
