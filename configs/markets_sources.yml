# Open Omniscience — curated worldwide MARKETS source catalog.
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# Seeded automatically alongside configs/sources.yml so the app ships ready to
# ingest financial-market, stock-exchange and commodity/rare-earth coverage. These
# are *sources* (the sites the ethical fetcher ingests from), identified by their
# stable primary domains. They are public market infrastructure and publishers; no
# credentials, no paywalled content, robots.txt always respected (fail-closed).
#
# What this file does NOT contain: per-page CSS price-extraction rules. A live
# price series is only produced where an operator has pinpointed the exact figure
# on a specific page (Markets tab → add rule → Test), because most exchange/quote
# pages are JavaScript-rendered and selectors rot — shipping unverified selectors
# would mean fabricated numbers, which this project refuses to do. See
# configs/market_rules.example.yml for honest, clearly-labelled rule templates.
#
# source_type is one of: stock_exchange | commodity | financial
# rss_url is intentionally omitted (left empty) for most entries: a wrong feed URL
# is just noise. Ingest these via the recursive crawler, or add a verified RSS feed
# per source from the Sources tab.

