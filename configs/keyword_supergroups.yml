# Initial keyword SUPER-GROUPS -- bundled concept scaffold (maintainer-ruled
# 2026-06-20: supergroups are durable umbrella CONCEPTS, one level broader than
# a ring -- NOT topics of the moment). Cherry-picked by us to set the editorial
# trajectory across the ~12 domains (politics, economy, science, culture,
# history...). Members are cross-language RINGS (configs/keyword_rings_generated
# + keyword_equivalents), so every group spans all 12 languages by construction.
# Grows toward ~200 as the ring set grows toward ~2000.
#
# Seeded at startup ONLY where a group name does not already exist -- the user's
# own edits/deletions always win. A ring member is validated against the ring set
# at seed time; an unknown ring id is skipped (never a dead member).

