# Open Omniscience — curated WORLDWIDE LAW & IP catalog.
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# Real, official primary-source legal portals (national legislation databases,
# official gazettes, IP offices, court/case-law and filing systems) across every
# region, plus a curated set of stable, well-known consolidated-law documents to
# *track for change over time* (the §5 "Wikipedia for the law" vertical).
#
# Honesty (law is high-stakes — see docs/LAW.md):
#   * These are RESEARCH MIRRORS, never the authoritative source: every record links
#     back to the official gazette, and the app says so. The tool tracks and surfaces;
#     it never interprets legality or gives legal advice.
#   * "Public" != "freely redistributable": licenses vary; we respect each, attribute,
#     store provenance, and fetch only through the ethical, robots-fail-closed path.
#   * Nothing is fabricated: every entry is a real official domain.
#
# `sources:` are seeded as ingestible/searchable Source rows (source_type: legal/ip).
# `documents:` are registered as tracked LawDocument rows (baseline -> diff -> flag).

sources:
