# Open Omniscience - News Sources Configuration
# Format:
#   - name: Source name (e.g., "BBC News")
#   - domain: Base domain (e.g., "bbc.com")
#   - rss_url: RSS feed URL (optional)
#   - rate_limit_ms: Delay between requests in milliseconds (default: 2000)
#   - enabled: Whether the source is active (default: true)
#   - tags: Categorization (e.g., ["news", "uk"])
#
# Note: All unnecessary fields (type, primary_language, priority, scan_config, etc.) have been removed.

