# Open Omniscience — curated official stock-market INDEX feed catalog.
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# A thought-through, no-API-key set of world stock-exchange index series that can
# be imported straight into the store and shown on the Indices board. Every point
# comes from the downloaded CSV on a real date — nothing is scraped or guessed, and
# the values are END-OF-DAY (daily) or END-OF-MONTH, never a fabricated real-time
# tick. Each entry carries its as-of date, source, CONTINENT and TAGS.
#
# Providers (all free, machine-readable, no key, robots-permitting):
#   • FRED (https://fred.stlouisfed.org/graph/fredgraph.csv?id=<ID>) — US named
#     indices, VIX and Nikkei as clean CSV (date col 0, value col 1; missing = ".").
#   • FRED · OECD MEI "Share Prices" (id SPASTT01<ISO3>M661N) — a MONTHLY share-price
#     INDEX (base 2015 = 100) for ~40 economies on every continent. This is the
#     honest ALL-CONTINENT path: the NAMED exchange indices (DAX, FTSE 100, CAC 40,
#     Hang Seng…) are NOT available through a free, robots-PERMITTING daily feed —
#     Stooq's robots.txt disallows them (verified live 2026-06-11), so they were
#     removed rather than fetched unethically. The OECD share-price index is the
#     comparable, ethically-fetchable per-country measure — a NORMALISED index
#     (2015 = 100, monthly), NOT the named exchange's point level. Labelled as such.
#
# Honesty notes:
#   • The OECD `SPASTT01<ISO3>M661N` IDs follow a documented FRED/OECD pattern and are
#     accurate to our knowledge, but were NOT live-verified in the build environment
#     (no outbound network here). If a provider retires/renames one the import fails
#     LOUDLY (HTTP error / no rows) rather than inventing data — fix the URL here.
#     Verify on a networked machine; candidates welcome via PR.
#   • `unit: pts` = a named index level (points); `unit: idx` = a normalised index
#     (2015 = 100). `currency` is the market's nominal denomination (provenance only;
#     index levels are never currency-converted). `continent` + `tags` drive the
#     board's category facets.

feeds:
  # --- United States — named indices (FRED) ------------------------------- #
  - key: idx_sp500
    name: "S&P 500"
    symbol: SP500
    category: index
    url: "https://fred.stlouisfed.org/graph/fredgraph.csv?id=SP500"
    currency: USD
    unit: pts
    market: "US · NYSE/Nasdaq"
    continent: "North America"
    tags: ["named", "broad", "large-cap"]
  - key: idx_nasdaq
    name: "NASDAQ Composite"
    symbol: NASDAQCOM
    category: index
    url: "https://fred.stlouisfed.org/graph/fredgraph.csv?id=NASDAQCOM"
    currency: USD
    unit: pts
    market: "US · Nasdaq"
    continent: "North America"
    tags: ["named", "technology", "broad"]
