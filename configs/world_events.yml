# Open Omniscience — curated WORLD EVENTS agenda (offline, honest, tagged).
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# Forward-looking agenda (see docs/FUTURE_DEVELOPMENTS.md → Events agenda). Events are
# grouped into CALENDARS you subscribe to, and each event carries TAGS (the facet/cross-
# link backbone) so a large catalog stays selectable / groupable / filterable.
#
# Honesty: NOTHING fabricated. Fixed-date observances carry `confirmed: true` + month/day
# (a real recurring date). Movable summits carry `confirmed: false` + their typical month/
# cadence and link to the official source for the exact date — we describe the known
# cadence, never invent a specific year's date. Every event has an `official_url`. Offline.

# Calendars: subscribable collections. (P1 will add user-subscribed external iCal feeds.)
calendars:
- {key: civic,         name: "Press freedom & civic days",   category: civic,      description: "Press-freedom and core civic observances."}
- {key: un_days,       name: "UN International Days",          category: civic,      description: "United Nations observances (fixed annual dates)."}
- {key: national_days, name: "National & independence days",  category: political,  description: "National days; exact public-holiday observance can shift."}
- {key: summits,       name: "Political summits",             category: political,  description: "Recurring summits; exact dates move yearly."}
- {key: economic,      name: "Economy & central banks",       category: economic,   description: "Central-bank decisions, OPEC; published calendars."}
- {key: tech,          name: "Technology conferences",        category: technology, description: "Flagship tech & developer conferences."}
- {key: elections,     name: "National elections",            category: civic,      description: "Upcoming national elections (presidential / general / legislative). Movable dates carry the electoral authority's source, never a fabricated day."}

