# --- elections (national elections; movable dates carry the authority's source, never a fabricated day) --- #
# HONESTY: only genuinely UPCOMING national elections (relative to this catalog's authoring date). A concrete
# `day` is set ONLY when fixed by law; otherwise day:null + confirmed:false + the authority's official_url —
# the real date lives at the source. Past elections are NOT listed here (a forward-looking agenda).
# Pilot: France 2027 presidential — movable within the constitutional window (term ends mid-May 2027; the
# poll is set by decree, with the first round held between 8 and 23 April 2027). No fabricated day.
- {title: "France — Presidential election 2027", calendar: elections, category: civic, country: FR, region: europe, cadence: "every 5 years", month: 4, day: null, confirmed: false, official_url: "https://www.conseil-constitutionnel.fr/", tags: [elections, presidential, france-2027], note: "Movable within the constitutional window: first round held between 8 and 23 April 2027; exact date set by decree. The Conseil constitutionnel oversees and proclaims results; see also the Ministère de l'Intérieur."}
# US federal general elections are fixed by statute (2 U.S.C. §7) to the Tuesday after the first Monday in
# November — a genuinely fixed date by law: confirmed:true, 2026-11-03.
- {title: "United States — Midterm elections 2026 (Congress)", calendar: elections, category: civic, country: US, region: americas, cadence: "every 2 years", month: 11, day: 3, confirmed: true, official_url: "https://www.eac.gov/", tags: [elections, legislative, us-2026], note: "Date fixed by federal statute (2 U.S.C. §7): the Tuesday after the first Monday in November."}
