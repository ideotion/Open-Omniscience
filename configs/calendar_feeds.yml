# Calendar feed directory — bundled candidates for the Agenda (maintainer-
# supplied aggregation, 2026-06-09; integrated 2026-06-10).
#
# HONESTY RULES:
# - This file ships as a DIRECTORY of candidates: nothing here is fetched at
#   boot (zero-network-boot is a non-negotiable). The operator verifies and
#   imports feeds explicitly; verdicts are recorded per machine with a date.
# - A 'family' groups feeds that describe the SAME thing from different
#   providers (duplicates by design): the user sees the duplication and can
#   open every source and its metadata. Imported events de-duplicate within
#   a family by (normalized title + date) but every source stays listed.
# - year_pinned feeds (WorldPublicHoliday) carry the year in the URL; the
#   verifier flags them when the pinned year falls behind the current one.
# FIELD-TEST VERDICTS (2026-06-11, 511/511 feeds checked on a live install):
# - calendar.google.com's robots.txt DISALLOWS its /calendar/ical/ paths: all
#   Google feeds are refused by our fail-closed fetcher. Entries stay listed
#   (the UI shows the honest verdict) but WorldPublicHoliday — 239/252 OK —
#   is the working holiday provider.
# - www.webcal.guru's robots likewise disallows its download endpoints.
# - 13 WPH country codes delivered no iCal (defunct/uninhabited ISO codes,
#   e.g. Antarctica, Serbia-Montenegro) and were pruned from the directory.
catalog_as_of: "2026-06"
