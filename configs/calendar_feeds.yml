# Providers that emit iCalendar but have no stable direct .ics URL (subscribe
# pages, APIs, self-hostable generators). Not importable as-is; shown in the
# directory so the operator can follow them. From the source list's Appendix C.
directory_only:
  - name: 'OpenHolidays API'
    url: 'https://www.openholidaysapi.org/en/'
    note: 'open data; iCal via accept: text/calendar; self-hostable'
  - name: 'Hebcal'
    url: 'https://www.hebcal.com/ical/'
    note: 'open source (GPL); Jewish calendar feed builder'
  - name: 'LiturgicalCalendar (litcal)'
    url: 'https://litcal.johnromanodorazio.com/'
    note: 'open source; Roman Catholic year; ICS via return_type=ICS'
  - name: 'Nager.Date'
    url: 'https://date.nager.at/'
    note: 'open source (MIT); ~110 countries; JSON API'
  - name: 'FOSDEM schedule'
    url: 'https://fosdem.org/2026/schedule/'
    note: 'per-track iCal exports; update the year each edition'
  - name: 'CalendarLabs'
    url: 'https://www.calendarlabs.com/ical-calendar'
    note: 'religions incl. Buddhist & Sikh, sports, WHO/UN; JS subscribe pages'
  - name: 'Office Holidays'
    url: 'https://www.officeholidays.com/subscribe'
    note: 'per-country feeds with regional detail'
  - name: 'F1 calendar'
    url: 'https://f1calendar.com/subscribe'
    note: 'Formula 1 races'
  - name: 'FIFA World Cup 2026 (matchesio)'
    url: 'https://www.matchesio.com/competition/world-cup/'
    note: 'ICS/CSV/JSON'
  - name: 'RocketLaunch.Live'
    url: 'https://www.rocketlaunch.live/'
    note: 'build a filtered feed, then subscribe'
