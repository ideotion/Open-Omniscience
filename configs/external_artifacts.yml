# ---------------------------------------------------------------------------- #
# External-artifact registry — the SINGLE SOURCE OF TRUTH for everything this
# project pins, vendors, or bundles from an outside source.
#
# Open Omniscience - Global Intelligence Platform for Investigative Journalism
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# WHY THIS EXISTS: dated/pinned external artifacts used to be guarded by scattered,
# per-file `*_AS_OF` constants + per-file freshness tests. That left two gaps: a NEW
# dated thing could ship with no guard, and nothing actively WATCHED UPSTREAM — you
# only learned something moved when it broke. This registry closes both:
#   * src/maintenance/registry.py reads it; tests/test_external_freshness.py enforces
#     it (every `*_AS_OF` constant in the tree MUST be registered here — the protocol
#     guard — and every entry must be within its freshness window + its couplings hold);
#   * scripts/check_external_freshness.py prints a report (the future upstream-watch
#     cron will use it to open an issue when upstream is newer);
#   * GET /api/diagnostics/freshness self-reports staleness from a production install.
#
# WHEN YOU ADD an externally-sourced artifact (a data file, a catalog, a vendored
# binary, a version coupling): ADD AN ENTRY HERE in the same commit. The guard test
# will fail otherwise.
#
# Entry fields:
#   id            unique slug
#   title         human label
#   kind          dated-data | catalog | vendored-data | vendored-binary | runtime-coupling | ci-pin
#   description   what it is / why we bundle it
#   upstream      where it comes from
#   check_upstream how to tell a newer release exists (for the cron + humans)
#   license       + attribution requirement when any
#   pin           one of:
#                   {file, const}            a `*_AS_OF` (or version) constant in source
#                   {path, sha256}           a vendored file + its expected digest
#                   {floor, verified}        a dependency floor + the version we verified
#   refresh       the command/steps to refresh it
#   freshness     {max_age_months: N}  |  {policy: on-security|track-duckdb-version|rarely}
#   couplings     ids/notes this must stay consistent with
#   platforms     (vendored-binary only) the per-OS/arch matrix
#   last_verified YYYY-MM-DD + who/how

artifacts:
  # --- dated data / catalogs (each has a *_AS_OF constant the guard checks) -------
  - id: ip-geo-country
    title: DB-IP IP-to-Country Lite
    kind: dated-data
    description: Offline IP->country range table bundled for source-IP geolocation (Slice 6b).
    upstream: https://db-ip.com/db/download/ip-to-country-lite (mirror sapics/ip-location-db, CC BY 4.0)
    check_upstream: "monthly release; mirror dbip-country/ updates ~monthly"
    license: CC BY 4.0 (attribution to DB-IP.com mandatory)
    pin: {file: src/geo/ip_geo.py, const: IP_GEO_AS_OF}
    refresh: "python scripts/build_ip_geo.py --mirror  # then set IP_GEO_AS_OF"
    freshness: {max_age_months: 6}
    couplings: ["src/geo/data/dbip_country_lite.csv.gz must exist + be parseable"]
    upstream_check: {github: "sapics/ip-location-db", type: path_commit, path: "dbip-country/dbip-country-ipv4.csv", compare: as_of}
    last_verified: "2026-07-16"

  - id: llm-model-catalog
    title: Ollama model catalog
    kind: catalog
    description: Curated dated catalog of installable local models (sizes/licenses) shown in Settings.
    upstream: https://ollama.com/library
    check_upstream: "tags on ollama.com/library; new small open models appear regularly"
    license: per-model (catalog is our metadata)
    pin: {file: src/llm/ollama.py, const: CATALOG_AS_OF}
    refresh: "verify tags via search (ollama.com 403s WebFetch); update MODEL_CATALOG + CATALOG_AS_OF"
    freshness: {max_age_months: 12}
    last_verified: "2026-06-17"

  - id: wiki-dump-sizes
    title: Wikipedia dump size estimates
    kind: dated-data
    description: Per-edition approximate compressed dump sizes shown inline in the picker.
    upstream: https://dumps.wikimedia.org
    check_upstream: "dump sizes grow ~monthly; re-measure from dumpstatus.json"
    license: CC BY-SA / GFDL (sizes are facts)
    pin: {file: src/wiki/dump_sizes.py, const: DUMP_SIZES_AS_OF}
    refresh: "re-measure per-edition sizes; update DUMP_SIZES + DUMP_SIZES_AS_OF"
    freshness: {max_age_months: 12}
    last_verified: "2026-06-16"

  - id: osm-region-sizes
    title: OSM region download size estimates
    kind: dated-data
    description: Per-region approximate .osm.pbf sizes shown in the offline-map picker.
    upstream: https://download.geofabrik.de
    check_upstream: "extracts grow ~weekly; re-measure"
    license: ODbL (sizes are facts)
    pin: {file: src/geo/osm_regions.py, const: OSM_SIZES_AS_OF}
    refresh: "re-measure region sizes; update OSM_SIZES_AS_OF"
    freshness: {max_age_months: 12}
    last_verified: "2026-06-16"

  - id: keyword-baseline
    title: Keyword positive baseline (type/topic tags)
    kind: dated-data
    description: Curated per-language keyword baseline tags (configs/keyword_baseline/*.yml).
    upstream: in-house curation (+ analyzer-grown)
    check_upstream: "grown from keyword-diagnostics logs; not an external feed"
    license: project (GPL-3.0-or-later)
    pin: {file: src/analytics/baseline.py, const: BASELINE_AS_OF}
    refresh: "extend configs/keyword_baseline/*.yml; bump BASELINE_AS_OF"
    freshness: {max_age_months: 18}
    last_verified: "2026-06-17"

  - id: stopwords-iso
    title: Multilingual stopword lists (stopwords-iso subset)
    kind: dated-data
    description: Vendored per-language stopword lists (configs/stopwords_iso/*.txt), applied language-scoped so a full Latin-script list is collision-free. Covers the 2026-06-23 no_stoplist set + the 2026-07-01 wave (de/es/it/pt/nl/ru/…) + the 2026-07-10 segmenter wave (zh/ja/th now segmentable via the [segmentation] extra, plus ko/mr).
    upstream: https://github.com/stopwords-iso/stopwords-iso (PyPI stopwordsiso 0.7.0/0.7.1 — byte-identical for the vendored languages)
    check_upstream: "re-fetch the stopwords-iso snapshot; community-maintained"
    license: MIT
    pin: {file: src/services/stopwords.py, const: STOPWORDS_ISO_AS_OF}
    refresh: "python scripts/build_stopwords.py (stopwordsiso bundles the data — offline); bump STOPWORDS_ISO_AS_OF"
    freshness: {max_age_months: 24}
    last_verified: "2026-07-10"

  - id: subjectivity-lexicons
    title: Subjectivity / loaded-language seed lexicons
    kind: dated-data
    description: Vendored per-language loaded/subjective-marker SEED lexicons (configs/subjectivity/*.txt) feeding the rule-based subjectivity engine (S5.2). Modest seeds across three scripts (en Latin / ru Cyrillic / ar Arabic), flagged for native review — NOT a lexicon of record. A language with no lexicon is declared unmeasured (honest gap), never scored at 0.
    upstream: none — hand-authored seeds; the vetted license-clean lexicon of record is an operator sourcing/vetting step (per-language native review)
    check_upstream: "operator sources + vets license-clean subjectivity/loaded-language lexicons per language"
    license: CC0-1.0 (original hand-authored seeds)
    pin: {file: src/analytics/subjectivity.py, const: SUBJECTIVITY_AS_OF}
    refresh: "replace/expand configs/subjectivity/<lang>.txt with the vetted lists; bump SUBJECTIVITY_AS_OF"
    freshness: {max_age_months: 24}
    last_verified: "2026-07-12"

  - id: stats-api-shapes
    title: Official-statistics API shapes
    kind: dated-data
    description: World Bank / Eurostat (SDMX) endpoint + response shapes the parser targets.
    upstream: World Bank API v2 / Eurostat SDMX-JSON
    check_upstream: "APIs version their schemas; re-verify the parser fixtures"
    license: per-provider
    pin: {file: src/stats/fetch.py, const: STATS_API_AS_OF}
    refresh: "re-verify SDMX/WB shapes against live; update fixtures + STATS_API_AS_OF"
    freshness: {max_age_months: 18}
    last_verified: "2026-06-16"

  - id: tracker-denylist
    title: Newsletter tracker-param denylist
    kind: dated-data
    description: Evidence-based recipient-tracking query-param denylist for .eml/mailbox detox.
    upstream: tracking-param research (mkt_tok, mc_eid, _hsenc, ...)
    check_upstream: "new tracking params appear; review periodically"
    license: project (GPL-3.0-or-later)
    pin: {file: src/privacy/link_sanitizer.py, const: DENYLIST_AS_OF}
    refresh: "extend the denylist; bump DENYLIST_AS_OF"
    freshness: {max_age_months: 18}
    last_verified: "2026-06-15"

  - id: install-size-estimates
    title: Installer download-size estimates
    kind: dated-data
    description: Rough per-component MB shown by install.sh before the pip step.
    upstream: measured from a real install log
    check_upstream: "re-measure when the dependency set changes materially"
    license: project (GPL-3.0-or-later)
    pin: {file: install.sh, const: SIZES_AS_OF}
    refresh: "re-measure component_mb; bump SIZES_AS_OF"
    freshness: {max_age_months: 18}
    last_verified: "2026-06-18"

  # --- vendored data / binaries (checksum/version, not time) ----------------------
  - id: vendored-alpine
    title: Alpine.js (vendored)
    kind: vendored-binary
    description: Alpine v3.14.1 vendored locally for the GUI gallery (no CDN, sha256-pinned).
    upstream: https://github.com/alpinejs/alpine (npm tarball)
    check_upstream: "watch alpinejs releases for security fixes"
    license: MIT
    pin: {path: src/static/guis/vendor/alpine.min.js, sha256: ""}  # filled by registry self-heal/verify
    refresh: "re-vendor the pinned version; update the sha256 + the gallery checksum constant"
    freshness: {policy: on-security}
    upstream_check: {github: "alpinejs/alpine", type: release, current: "v3.14.1"}
    # Checked 2026-07-16 (freshness issue #440 flagged v3.15.12 upstream): no GitHub
    # Security Advisory exists for alpinejs/alpine, and none of the v3.14.2-v3.15.12
    # release notes mention a CVE/vulnerability/XSS fix -- policy is on-security, so
    # correctly NOT re-vendored. Re-check next time the issue flags a newer upstream.
    last_verified: "2026-07-16"

  - id: natural-earth-geometry
    title: Natural Earth coastline + country polygons
    kind: vendored-data
    description: world_outline.json (110m land) + world_countries.json (110m admin-0) for ooMap.
    upstream: https://www.naturalearthdata.com (public domain)
    check_upstream: "Natural Earth changes rarely; refresh only on a data correction"
    license: public domain
    pin: {path: src/static/world_countries.json, sha256: ""}
    refresh: "python scripts/build_country_polygons.py ; python scripts/build_world_outline.py"
    freshness: {policy: rarely}
    last_verified: "2026-06-18"

  # --- runtime version couplings (the gotchas the cron alone can't see) -----------
  - id: duckdb-crypto-extension
    title: DuckDB + httpfs/OpenSSL crypto extension coupling
    kind: runtime-coupling
    description: >
      The columnar store's PERSISTED-OFFLINE encryption needs the OpenSSL crypto backend,
      which ships in DuckDB's `httpfs` extension. That extension is a NATIVE binary pinned
      to the EXACT DuckDB version and per platform+arch. DuckDB's default autoinstall/
      autoload would fetch it over the network (we disable that), so to enable persisted
      encryption the per-OS extension must be bundled locally for the pinned DuckDB version.
    upstream: https://github.com/duckdb/duckdb (+ extensions.duckdb.org)
    check_upstream: "watch duckdb releases; the storage format + extension version both move"
    license: MIT (DuckDB)
    pin: {floor: "1.4", verified: "1.5.4"}   # pyproject [columnar] duckdb>=floor ; verified against
    refresh: >
      On a DuckDB bump: re-download httpfs for EVERY supported platform_arch at the NEW
      version; verify each signature/checksum; re-run the encryption gate per platform;
      confirm the persisted store still opens (else delete+rebuild — it is disposable);
      update {floor, verified} here.
    freshness: {policy: track-duckdb-version}
    upstream_check: {github: "duckdb/duckdb", type: release, current: "v1.5.4"}
    platforms: [linux_amd64, linux_arm64, osx_amd64, osx_arm64, windows_amd64]
    couplings:
      - "pyproject.toml [project.optional-dependencies] columnar duckdb>= must equal floor"
      - "the on-disk store format is version-bound; on mismatch the disposable store is rebuilt"
    last_verified: "2026-06-19"

  - id: duckdb-httpfs-extension
    title: DuckDB httpfs extension binaries (persisted-store crypto backend, D1)
    kind: vendored-binary
    description: >
      Per-OS/arch static-OpenSSL ``httpfs`` extension binaries that let the columnar store's
      PERSISTED encrypted DuckDB file open OFFLINE (D1). Bundled under
      src/analytics/duckdb_ext/ and LOADed BY ABSOLUTE PATH after a SHA-256 verify
      (src/analytics/columnar.py:_verified_httpfs_path); DuckDB's own network autoload is
      disabled. Ships EMPTY: the binaries + their real sha256 are the maintainer's networked
      build (docs/maintenance/EXTERNAL_DEPENDENCIES.md). Until they land,
      secure_crypto_available() stays False and the engine runs in-memory (never a plaintext
      file, never a fabricated checksum).
    upstream: https://github.com/duckdb/duckdb (httpfs built with statically-linked OpenSSL via vcpkg)
    check_upstream: "rebuild per platform on any duckdb minor bump (the version couples)"
    license: MIT (DuckDB)
    pin: {floor: "1.4", verified: "1.5.4"}   # tracks the installed duckdb minor, like duckdb-crypto-extension
    binaries:                                # per-platform pins; version+sha256 BLANK until the networked build (NEVER fabricated)
      linux_amd64:   {version: "", sha256: "", file: ""}
      linux_arm64:   {version: "", sha256: "", file: ""}
      osx_amd64:     {version: "", sha256: "", file: ""}
      osx_arm64:     {version: "", sha256: "", file: ""}
      windows_amd64: {version: "", sha256: "", file: ""}
    refresh: >
      On a DuckDB bump or first bundling: build httpfs with statically-linked OpenSSL for
      EACH platform at the pinned duckdb version, record each binary's real sha256, place it
      in src/analytics/duckdb_ext/, fill {version, sha256, file} here, then re-run the
      encryption gate per platform (the CI httpfs lane). See EXTERNAL_DEPENDENCIES.md.
    freshness: {policy: track-duckdb-version}
    couplings:
      - "each bundled binaries[*].version minor MUST equal the installed duckdb minor (loader + test-enforced)"
      - "an EMPTY pin keeps columnar.secure_crypto_available() False (test-enforced)"
      - "the sha256 pins are NEVER computed/promoted in CI — only the operator's audited build fills them"
    last_verified: "2026-07-12"

  # --- CI / supply-chain pins (Dependabot territory; recorded so they are not forgotten) --
  - id: ci-action-and-tool-pins
    title: CI action SHAs + pinned QA tools
    kind: ci-pin
    description: GitHub Action SHAs (checkout, setup-python) + pinned mypy/bandit/pip-audit/ruff.
    upstream: the respective repos
    check_upstream: "enable Dependabot for github-actions + pip; it opens PRs on new releases"
    license: per-tool
    pin: {file: .github/workflows/ci.yml, const: NONE}  # SHAs carry tag comments; Dependabot bumps
    refresh: "let Dependabot bump; re-pin to the new SHA with the tag comment"
    freshness: {policy: on-security}
    last_verified: "2026-06-15"
