# Trans-language keyword equivalents — the curated bridge for cross-language
# analytics. FIRST REAL BATCH drafted 2026-06-11 from the maintainer's field
# log (1,349 articles; en 70k / fr 8.1k / de 1.2k article-language signature
# volume). Built batch-by-batch from the keyword diagnostics logs.
#
# THE RULES (honesty by construction):
# - Always language-qualified: `fr:main` ≠ `en:main` (the polysemy trap).
# - Members come from the operator's REAL logs (language signatures =
#   distinct-article counts per article language), human-reviewed. Never a
#   blind dictionary import.
# - Per-language counts stay visible in any merged view; the user can split
#   any ring. Polysemous members carry a reasoning note.
rings:
  # --- From the 2026-06-11 log (fr terms verified ≥70% fr-dominant) -------- #
