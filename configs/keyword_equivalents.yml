  # --- Entity ACRONYM aliases across scripts (2026-07-18, entity-families brief S3):
  #     ring membership is casefolded at parse+lookup time (equivalence._norm/ring_of),
  #     so an ALL-CAPS entity normalized form (USA, ФСБ) matches these lowercase-written
  #     members exactly like any other ring -- no special-case code needed. Hand-curated,
