# PROVENANCE: episodes per the NOAA Climate Prediction Center's Oceanic Niño
# Index (ONI) convention — an El Niño episode = ONI ≥ +0.5 °C for at least 5
# consecutive overlapping 3-month seasons. Intensity buckets follow the CPC
# usage (weak 0.5–0.9, moderate 1.0–1.4, strong 1.5–1.9, very strong ≥ 2.0,
# by peak ONI).
#
# VERIFICATION STATUS: drafted 2026-06-12 from the assistant's training
# knowledge of the published ONI record; verification_status says so PER
# ENTRY, and the catalog discipline applies — entries graduate to
# "verified" only after a clearnet check against the CPC table
# (https://origin.cpc.ncep.noaa.gov/products/analysis_monitoring/ensostuff/ONI_v5.php).
# Honest by construction: the as-of date and the pending flag travel with
# every entry; nothing here is presented as verified until it is.
as_of: "2026-06-12"
source: "NOAA CPC Oceanic Niño Index (ONI), v5"
method: "episode = ONI >= +0.5 for >= 5 consecutive overlapping 3-month seasons; peak ONI sets intensity"
