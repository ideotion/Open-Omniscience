# Open Omniscience configuration.
#
# Honest contract (v0.0.7 audit, finding DOC-02): every key in this file is
# actually read by src/config/settings.py:_apply_yaml_config. Keys that were
# documented here but ignored by the code (database.sqlite_path, logging
# rotation sizes, audit file paths, frontend.*, export.*, CORS method/header
# lists) have been removed rather than left as decoys. Environment variables
# override these values; runtime UI preferences live in data/app_settings.json.
#
# Not configured here (by design):
#   - database location  -> DATABASE_URL / OO_DATA_DIR environment variables
#   - app version        -> single-sourced from package metadata (pyproject.toml)
#   - theme & UI prefs   -> Settings UI, persisted to data/app_settings.json

# Application settings
app:
  name: "Open Omniscience"
  debug: false

# Scraping settings (the ethical fetcher also honours OO_FETCH_* env vars)
scraping:
  max_workers: 5        # Number of parallel threads for scraping
  max_retries: 3        # Maximum retries for transient fetch failures
  initial_retry_delay: 1  # Initial backoff delay in seconds (exponential)
  timeout: 10           # Request timeout in seconds
  user_agent: "OpenOmniscience/1.0 (+https://github.com/ideotion/Open-Omniscience)"

# API rate limiting
rate_limiting:
  global_rate_limit: "100/hour"   # Global API rate limit
  search_rate_limit: "100/hour"   # Rate limit for search endpoint
  export_rate_limit: "50/hour"    # Rate limit for export endpoint
  sources_rate_limit: "100/hour"  # Rate limit for sources endpoint

# Logging settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "logs/open_omniscience.log"

# (finding OO-D5-002) the audit: section was removed -- its keys mapped to dead
# Config fields and no code wrote to that directory. The operative trail is the
# tamper-evident custody log (src/custody) plus structured logging.

# Security settings (loopback only -- do not widen on a local-first deployment)
security:
  cors_origins: ["http://127.0.0.1:8000", "http://localhost:8000"]
  cors_allow_credentials: true
