# Open Omniscience Configuration Settings
# This file contains user preferences and rate limits for the application

# Application settings
app:
  name: "Open Omniscience"
  # The version is single-sourced from the installed package metadata
  # (pyproject.toml) at runtime -- see src/config/settings.py:_package_version
  # (finding BUG-03). Any value here is ignored on purpose to prevent drift.
  debug: false
  
# Scraping settings
scraping:
  max_workers: 5  # Number of parallel threads for scraping
  max_retries: 3  # Maximum retries for failed requests
  initial_retry_delay: 1  # Initial delay in seconds for retries (exponential backoff)
  timeout: 10  # Request timeout in seconds
  user_agent: "OpenOmniscience/1.0 (+https://github.com/ideotion/Open-Omniscience)"
  
# Rate limiting
rate_limiting:
  global_rate_limit: "100/hour"  # Global API rate limit
  search_rate_limit: "100/hour"  # Rate limit for search endpoint
  export_rate_limit: "50/hour"  # Rate limit for export endpoint
  sources_rate_limit: "100/hour"  # Rate limit for sources endpoint
  
# Database settings
database:
  # For SQLite (default)
  sqlite_path: "data/open_omniscience.db"
  
  # For PostgreSQL (uncomment and configure for production)
  # postgres_url: "postgresql://user:password@localhost:5432/open_omniscience"
  
# Logging settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "logs/open_omniscience.log"
  max_log_size: 10485760  # 10MB
  backup_count: 5
  
# Audit settings
audit:
  enabled: true
  log_directory: "audit"
  scrape_log: "audit/scrape_log.csv"
  error_log: "audit/errors.log"
  
# Frontend settings
frontend:
  articles_per_page: 20
  default_language: "en"
  theme: "system"  # light, dark, or system
  
# Export settings
export:
  max_export_size: 10000  # Maximum number of articles to export at once
  csv_encoding: "utf-8"
  
# Security settings
security:
  cors_origins: ["http://127.0.0.1:8000", "http://localhost:8000"]  # loopback only
  cors_allow_credentials: true
  cors_allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  cors_allow_headers: ["Authorization", "Content-Type", "Accept"]
