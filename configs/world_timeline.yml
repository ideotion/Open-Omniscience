# Open Omniscience — curated space-time anchors for the Temporal Map.
# Copyright (C) 2026 Ideotion. GPL-3.0-or-later.
#
# These are well-documented, public historical and scheduled events, each with a
# REAL coordinate and date, used to seed the temporal map so the time-slider has
# something honest to show before any corpus is indexed. They demonstrate the
# axis the journalist actually works on: *space and time together*.
#
# Honesty rules for this file:
#   * lat/lon are real geographic facts (degrees). No invented positions.
#   * date is ISO (YYYY-MM-DD). Quote it (YAML reads 0079-10-24 oddly otherwise).
#   * date_precision says how much of the date is firm: day | month | year.
#   * confirmed: true only when the date is historically/officially fixed.
#     Scheduled future events (Olympics, eclipses) are confirmed because they
#     have an official/astronomical date; a `note` carries any caveat.
#   * `note` carries genuine scholarly disagreement (e.g. Pompeii's exact day)
#     — we surface the doubt, we don't paper over it.
#
# kinds (drive the map legend/colour): disaster, conflict, milestone, civic,
#       space, science, climate, sport
#
# This is a SEED, not a claim of completeness. Absence here means "not curated",
# never "did not happen".

