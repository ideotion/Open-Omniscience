# Generated law-source catalog — produced by parallel internet research sessions
# per docs/design/LAW_SOURCES_ACQUISITION_2026-07-17.md (contract oo-legal-catalog-gen-1).
# Merged mechanically from the per-batch session outputs (documents: country->jurisdiction
# renamed; a missing verification block defaults to lead). Validated by
# scripts/validate_legal_catalog.py. Curated configs/legal_sources.yml WINS on any
# domain/(jurisdiction,url) collision. Verification statuses are per-row facts from
# the producing session — a 'lead' was never loaded and needs a maintainer decision.
# One host may appear twice with distinct `kind` (codes portal + gazette): registration
# must collapse those onto the one Source row (Source.domain is unique).
schema: oo-legal-catalog-gen-1
as_of: "2026-07-17"
batches:
- {batch: "africa-west", session_date: "2026-07-17"}
- {batch: "africa-east", session_date: "2026-07-17"}
- {batch: "africa-central-south", session_date: "2026-07-17"}
- {batch: "mena", session_date: "2026-07-17"}
- {batch: "europe-central-baltics-microstates", session_date: "2026-07-17"}
- {batch: "europe-east-caucasus", session_date: "2026-07-17"}
- {batch: "south-central-america", session_date: "2026-07-17"}
- {batch: "southeast-asia", session_date: "2026-07-17"}
