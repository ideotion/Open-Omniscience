<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Omniscience "Desk" icon: the same almond eye as the main icon, but its
     pupil is an open book — the calm, editorial, reading-first interface.
     Warm brass on dark to set it apart at a glance. GPL-3.0-or-later. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2012"/>
      <stop offset="1" stop-color="#15100a"/>
    </linearGradient>
    <radialGradient id="iris" cx="42%" cy="38%" r="70%">
      <stop offset="0" stop-color="#e7c585"/>
      <stop offset="0.6" stop-color="#c9a25e"/>
      <stop offset="1" stop-color="#8a5a2b"/>
    </radialGradient>
    <clipPath id="eye">
      <path d="M24 128 Q128 40 232 128 Q128 216 24 128 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bg)"/>

  <g clip-path="url(#eye)">
    <circle cx="128" cy="128" r="92" fill="url(#iris)" opacity="0.95"/>
    <!-- open book (two fanned pages) as the pupil -->
    <g>
      <path d="M128 102 C108 92 84 92 68 100 L68 158 C84 150 108 150 128 160 Z"
            fill="#f4ecd6" stroke="#5a3c18" stroke-width="4" stroke-linejoin="round"/>
      <path d="M128 102 C148 92 172 92 188 100 L188 158 C172 150 148 150 128 160 Z"
            fill="#fbf6ea" stroke="#5a3c18" stroke-width="4" stroke-linejoin="round"/>
      <line x1="128" y1="102" x2="128" y2="160" stroke="#5a3c18" stroke-width="4"/>
      <g stroke="#9a6a2f" stroke-width="3" stroke-linecap="round" opacity="0.7">
        <line x1="82" y1="112" x2="116" y2="110"/>
        <line x1="82" y1="124" x2="116" y2="122"/>
        <line x1="82" y1="136" x2="116" y2="134"/>
        <line x1="140" y1="110" x2="174" y2="112"/>
        <line x1="140" y1="122" x2="174" y2="124"/>
        <line x1="140" y1="134" x2="174" y2="136"/>
      </g>
    </g>
  </g>

  <!-- eye outline on top -->
  <path d="M24 128 Q128 40 232 128 Q128 216 24 128 Z"
        fill="none" stroke="#e7c585" stroke-width="9" stroke-linejoin="round"/>
</svg>
