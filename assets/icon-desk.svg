<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Omniscience "Desk" icon (black & white): the same almond eye as the main
     icon, but its pupil is an open book — the calm, editorial, reading-first
     interface. Inverted for the "paper" feel (black linework on white).
     Monochrome by design. GPL-3.0-or-later. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="eye">
      <path d="M24 128 Q128 40 232 128 Q128 216 24 128 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" fill="#ffffff"/>

  <g clip-path="url(#eye)">
    <circle cx="128" cy="128" r="92" fill="#000000" opacity="0.05"/>
    <!-- open book (two fanned pages) as the pupil -->
    <g>
      <path d="M128 102 C108 92 84 92 68 100 L68 158 C84 150 108 150 128 160 Z"
            fill="#ffffff" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
      <path d="M128 102 C148 92 172 92 188 100 L188 158 C172 150 148 150 128 160 Z"
            fill="#ffffff" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
      <line x1="128" y1="102" x2="128" y2="160" stroke="#000000" stroke-width="4"/>
      <g stroke="#000000" stroke-width="3" stroke-linecap="round" opacity="0.55">
        <line x1="82" y1="112" x2="116" y2="110"/>
        <line x1="82" y1="124" x2="116" y2="122"/>
        <line x1="82" y1="136" x2="116" y2="134"/>
        <line x1="140" y1="110" x2="174" y2="112"/>
        <line x1="140" y1="122" x2="174" y2="124"/>
        <line x1="140" y1="134" x2="174" y2="136"/>
      </g>
    </g>
  </g>

  <!-- eye outline on top -->
  <path d="M24 128 Q128 40 232 128 Q128 216 24 128 Z"
        fill="none" stroke="#000000" stroke-width="9" stroke-linejoin="round"/>
</svg>
